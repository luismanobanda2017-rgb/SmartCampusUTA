<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page">
<div id="sc-navbar"></div>

<main class="container">
  <section class="auth-card p-4">
    <a class="d-flex align-items-center gap-2 mb-4" href="../index.html">
      <span class="brand-mark">SC</span><strong>SmartCampusUTA</strong>
    </a>
    <h1 class="h3 mb-1">Crear cuenta</h1>
    <p class="text-muted mb-4">Usa tu correo institucional <strong>@uta.edu.ec</strong></p>

    <div id="reg-error" class="alert alert-danger" hidden></div>
    <div id="reg-ok" class="alert alert-success" hidden></div>

    <form id="form-registro">
      <div class="mb-3">
        <label class="form-label" for="nombre">Nombre completo</label>
        <input class="form-control" id="nombre" type="text" placeholder="Ej. Juan Pérez" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="email">Correo institucional</label>
        <input class="form-control" id="email" type="email" placeholder="usuario@uta.edu.ec" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-control" id="password" type="password" minlength="6" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="confirm">Confirmar contraseña</label>
        <input class="form-control" id="confirm" type="password" required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Registrarse</button>
    </form>

    <p class="mt-3 text-center">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
    </p>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/auth.js"></script>
</body>
</html>
