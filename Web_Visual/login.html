<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page">
<div id="sc-navbar"></div>

<main class="container">
  <section class="auth-card p-4">
    <a class="d-flex align-items-center gap-2 mb-4" href="../index.html">
      <span class="brand-mark">SC</span><strong>SmartCampusUTA</strong>
    </a>
    <h1 class="h3 mb-1">Iniciar sesión</h1>
    <p class="text-muted mb-4">Accede con tu correo institucional UTA.</p>

    <div id="login-error" class="alert alert-danger" hidden></div>

    <form id="form-login">
      <div class="mb-3">
        <label class="form-label" for="email">Correo electrónico</label>
        <input class="form-control" id="email" type="email" placeholder="usuario@uta.edu.ec" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-control" id="password" type="password" required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Ingresar</button>
    </form>

    <p class="mt-3 text-center">
      ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
    </p>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/auth.js"></script>
</body>
</html>
