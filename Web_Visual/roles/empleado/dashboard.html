<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Empleado - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="sc-navbar"></div>
<main class="container py-4">
  <header class="page-header">
    <h1>👨‍💼 Panel Empleado</h1>
    <p class="text-muted">Atención de turnos y gestión de trámites.</p>
  </header>

  <div class="row g-3 mb-4">
    <div class="col-md-4"><a class="action-card text-decoration-none d-block p-3" href="gestion_turnos.html">
      <span class="icon d-flex align-items-center justify-content-center mb-2" style="font-size:1.5rem">🎫</span>
      <h2 class="h6">Turnos</h2></a></div>
    <div class="col-md-4"><a class="action-card text-decoration-none d-block p-3" href="gestion_tramites.html">
      <span class="icon d-flex align-items-center justify-content-center mb-2" style="font-size:1.5rem">📋</span>
      <h2 class="h6">Trámites</h2></a></div>
    <div class="col-md-4"><a class="action-card text-decoration-none d-block p-3" href="../../index.html">
      <span class="icon d-flex align-items-center justify-content-center mb-2" style="font-size:1.5rem">🏠</span>
      <h2 class="h6">Inicio</h2></a></div>
  </div>

  <section class="content-panel p-4">
    <h2 class="h5 mb-3">Turnos asignados</h2>
    <div id="turnos-list">
      <div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>
    </div>
  </section>
</main>

<footer class="footer text-center mt-4">
  <div class="container"><p class="mb-0">SmartCampus UTA · 2025</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireSession } from '../../assets/js/auth.js';
  import { obtenerTurnosPorEstado, atenderSiguienteTurno, finalizarTurno } from '../../../src/Persistence/supabaseClient.js';

  const usuario = requireSession();
  if (!usuario || usuario.rol !== 'empleado') { alert('Acceso solo para empleados.'); window.location.href='../../index.html'; }

  const el = document.getElementById('turnos-list');

  async function cargar() {
    el.innerHTML = '<div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>';
    try {
      const esperando = await obtenerTurnosPorEstado('esperando');
      if (!esperando.length) { el.innerHTML = '<p class="text-muted">No hay turnos en espera.</p>'; return; }
      el.innerHTML = `<ul class="list-group">${esperando.map(t=>`<li class="list-group-item d-flex justify-content-between align-items-center">
        <div><strong>${t.usuarios?.nombre||'Anon'}</strong><br><small class="text-muted">${t.servicio}</small></div>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-primary" data-atender="${t.servicio}">Atender siguiente</button>
          <button class="btn btn-sm btn-outline-secondary" data-finalizar="${t.id}">Finalizar</button>
        </div>
      </li>`).join('')}</ul>`;
    } catch (e) { el.innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
  }

  el.addEventListener('click', async (ev) => {
    const btnAt = ev.target.closest('[data-atender]');
    const btnFin = ev.target.closest('[data-finalizar]');
    if (btnAt) {
      try { await atenderSiguienteTurno(btnAt.dataset.atender); await cargar(); }
      catch (e) { alert(e.message); }
    }
    if (btnFin) {
      if (!confirm('Marcar turno como finalizado?')) return;
      try { await finalizarTurno(btnFin.dataset.finalizar); await cargar(); }
      catch (e) { alert(e.message); }
    }
  });

  await cargar();
</script>
</body>
</html>
