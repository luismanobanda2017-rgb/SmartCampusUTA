<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Empleado - SmartCampusUTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <div id="sc-navbar"></div>

    <main class="container py-4">

      <!-- Encabezado -->
      <header class="page-header mb-4">
        <h1 class="fw-800 mb-1">👨‍💼 Panel Empleado</h1>
        <p class="text-muted mb-0">Atención de turnos, trámites asignados y gestión interna.</p>
      </header>

      <!-- KPIs -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-4">
          <div class="metric-card p-3">
            <p class="text-muted mb-1 small">Turnos en espera</p>
            <div class="value" id="r-turnos">…</div>
          </div>
        </div>
        <div class="col-6 col-md-4">
          <div class="metric-card p-3">
            <p class="text-muted mb-1 small">Trámites pendientes</p>
            <div class="value" id="r-tramites">…</div>
          </div>
        </div>
        <div class="col-6 col-md-4">
          <div class="metric-card p-3">
            <p class="text-muted mb-1 small">Turno actual</p>
            <div class="value" id="r-turno-actual">—</div>
          </div>
        </div>
      </div>

      <!-- Accesos rápidos -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <a class="action-card" href="gestion_turnos.html">
            <div class="action-icon">🎫</div>
            <span class="action-label">Turnos (Cola)</span>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a class="action-card" href="gestion_tramites.html">
            <div class="action-icon">📋</div>
            <span class="action-label">Trámites</span>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a class="action-card" href="atender_turno.html">
            <div class="action-icon">✅</div>
            <span class="action-label">Atender Turno</span>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a class="action-card" href="mis_tramites_asignados.html">
            <div class="action-icon">📁</div>
            <span class="action-label">Mis Asignados</span>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a class="action-card" href="documentos_pendientes.html">
            <div class="action-icon">📄</div>
            <span class="action-label">Documentos</span>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a class="action-card" href="horario_atencion.html">
            <div class="action-icon">🕐</div>
            <span class="action-label">Mi Horario</span>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a class="action-card" href="mapa_campus.html">
            <div class="action-icon">🗺️</div>
            <span class="action-label">Mapa Campus</span>
          </a>
        </div>
      </div>

      <!-- Cola FIFO en espera -->
      <div class="content-panel">
        <h2 class="h5 mb-3">🎫 Turnos en espera (Cola FIFO)</h2>
        <div id="turnos-list" class="text-muted small">
          <div class="spinner-block text-center">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        </div>
      </div>

    </main>

    <footer class="footer text-center mt-4">
      <div class="container"><p class="mb-0">SmartCampus UTA - 2025</p></div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>

  <script type="module">
    import { requireSession } from '../../assets/js/auth.js';
    import { obtenerTurnosPorEstado, obtenerTodosTramites, atenderSiguienteTurno, finalizarTurno } from '../../../src/Persistence/supabaseClient.js';
    import { Cola } from '../../../src/Domain/DataStructures/Cola.js';

    const usuario = requireSession();
    if (!usuario || usuario.rol !== 'empleado') {
      window.location.href = '../../../index.html';
    }

    const elTurnos = document.getElementById('turnos-list');

    async function cargarDashboard() {
      try {
        const [turnos, tramites] = await Promise.all([
          obtenerTurnosPorEstado('esperando'),
          obtenerTodosTramites()
        ]);

        // KPIs
        document.getElementById('r-turnos').textContent = turnos?.length ?? 0;
        const pendientes = tramites?.filter(t => t.estado === 'pendiente') ?? [];
        document.getElementById('r-tramites').textContent = pendientes.length;

        // Turno actual (primero en cola)
        if (turnos?.length) {
          document.getElementById('r-turno-actual').textContent = turnos[0].usuarios?.nombre || 'T-' + turnos[0].id;
        } else {
          document.getElementById('r-turno-actual').textContent = 'Sin turnos';
        }

        // Cola FIFO usando estructura Cola
        if (!turnos?.length) {
          elTurnos.innerHTML = '<p class="text-muted mb-0">No hay turnos en espera.</p>';
          return;
        }

        const cola = new Cola(turnos.length);
        turnos.forEach(t => cola.encolar(t));

        elTurnos.innerHTML = `
          <div class="d-flex gap-2 mb-3">
            <button id="btn-atender-next" class="btn btn-primary btn-sm">Atender siguiente</button>
            <button id="btn-refrescar" class="btn btn-outline-secondary btn-sm">Refrescar</button>
          </div>
          <ul class="list-group">
            ${cola.toArray().map((t, i) => `
              <li class="list-group-item d-flex justify-content-between align-items-center ${i === 0 ? 'list-group-item-warning' : ''}">
                <div>
                  <strong>${t.usuarios?.nombre || 'Anónimo'}</strong>
                  <span class="badge bg-secondary ms-2">${t.servicio || 'General'}</span>
                  ${i === 0 ? '<span class="badge bg-warning text-dark ms-1">Siguiente</span>' : ''}
                  <br><small class="text-muted">${new Date(t.created_at).toLocaleString('es-EC')}</small>
                </div>
                <button class="btn btn-sm btn-outline-danger" data-finalizar="${t.id}">Finalizar</button>
              </li>
            `).join('')}
          </ul>`;

        document.getElementById('btn-atender-next')?.addEventListener('click', async () => {
          try {
            const primero = turnos[0];
            await atenderSiguienteTurno(primero.servicio || 'general');
            await cargarDashboard();
          } catch (e) { alert(e.message); }
        });

        document.getElementById('btn-refrescar')?.addEventListener('click', cargarDashboard);

        elTurnos.addEventListener('click', async (ev) => {
          const btn = ev.target.closest('[data-finalizar]');
          if (!btn) return;
          if (!confirm('¿Marcar turno como finalizado?')) return;
          try {
            await finalizarTurno(btn.dataset.finalizar);
            await cargarDashboard();
          } catch (e) { alert(e.message); }
        }, { once: true });

      } catch (err) {
        elTurnos.innerHTML = `<div class="alert alert-danger small">${err.message}</div>`;
        console.warn('Error cargando dashboard empleado:', err);
      }
    }

    document.addEventListener('DOMContentLoaded', cargarDashboard);
  </script>
</body>
</html>
