<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentos Pendientes - Empleado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <div id="sc-navbar"></div>

    <main class="container py-4">

      <header class="page-header mb-4">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h1 class="fw-800 mb-1">📄 Documentos Pendientes</h1>
            <p class="text-muted mb-0">Revisión y aprobación de documentos usando el árbol documental.</p>
          </div>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">← Volver</a>
        </div>
      </header>

      <div class="content-panel">
        <div id="tree-container" class="text-muted small">
          <div class="spinner-block text-center">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        </div>
      </div>

    </main>

    <footer class="footer text-center mt-4">
      <div class="container"><p class="mb-0">SmartCampus UTA - 2025</p></div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>

  <script type="module">
    import { requireSession } from '../../assets/js/auth.js';
    import { obtenerTodosTramites } from '../../../src/Persistence/supabaseClient.js';
    import { Arbol } from '../../../src/Domain/DataStructures/Arbol.js';

    const usuario = requireSession();
    if (!usuario || usuario.rol !== 'empleado') {
      window.location.href = '../../../index.html';
    }

    function renderNodo(nodo) {
      if (!nodo) return '';
      return `
        <div class="tree-node mb-2">
          <div class="d-flex justify-content-between align-items-center">
            <strong>${nodo.nombre || nodo.tipo || 'Documento'}</strong>
            <div class="d-flex gap-1">
              <button class="btn btn-sm btn-outline-success" onclick="aprobarDoc('${nodo.id}')">Aprobar</button>
              <button class="btn btn-sm btn-outline-danger" onclick="rechazarDoc('${nodo.id}')">Rechazar</button>
            </div>
          </div>
          ${nodo.hijos?.length ? `<div class="tree-children mt-2">${nodo.hijos.map(renderNodo).join('')}</div>` : ''}
        </div>`;
    }

    window.aprobarDoc  = (id) => alert(`Documento ${id} aprobado (implementar conexión backend).`);
    window.rechazarDoc = (id) => alert(`Documento ${id} rechazado (implementar conexión backend).`);

    async function cargar() {
      const el = document.getElementById('tree-container');
      try {
        const tramites = await obtenerTodosTramites();
        const pendientes = tramites?.filter(t => t.estado === 'pendiente') ?? [];

        if (!pendientes.length) {
          el.innerHTML = '<p class="text-muted mb-0">No hay documentos pendientes de revisión.</p>';
          return;
        }

        // Construir árbol simple por tipo de trámite
        const grupos = {};
        pendientes.forEach(t => {
          if (!grupos[t.tipo]) grupos[t.tipo] = { nombre: t.tipo, id: t.tipo, hijos: [] };
          grupos[t.tipo].hijos.push({ nombre: t.usuarios?.nombre || '—', id: t.id, hijos: [] });
        });

        el.innerHTML = Object.values(grupos).map(renderNodo).join('');
      } catch (e) {
        el.innerHTML = `<div class="alert alert-danger small">${e.message}</div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', cargar);
  </script>
</body>
</html>
