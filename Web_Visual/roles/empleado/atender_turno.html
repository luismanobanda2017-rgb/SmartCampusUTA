<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atender turno - Empleado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/empleado.css">
</head>
<body class="empleado-accent">
  <div class="app-shell">
    <div data-navbar></div>
    <main class="container py-4">
      <div class="page-header">
        <h1>Atender turno</h1>
        <p class="text-muted">Consume el siguiente turno de la cola FIFO.</p>
      </div>
      <div class="row g-3">
        <div class="col-lg-5">
          <section class="content-panel">
            <h2 class="h5">Siguiente en cola</h2>
            <div data-cola></div>
            <button class="btn btn-warning w-100 mt-3" id="next">Siguiente turno</button>
          </section>
        </div>
        <div class="col-lg-7">
          <section class="content-panel">
            <form>
              <label class="form-label">Estado de atencion</label>
              <select class="form-select mb-3"><option>atendido</option><option>derivado</option><option>cancelado</option></select>
              <label class="form-label">Notas</label>
              <textarea class="form-control mb-3" rows="5"></textarea>
              <button id="finalizar-turno" class="btn btn-primary">Finalizar turno</button>
            </form>
          </section>
        </div>
      </div>
    </main>
    <div data-footer></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script type="module" src="../../assets/js/api.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/componentes/navbar.js"></script>
  <script src="../../assets/js/componentes/footer.js"></script>
  <script src="../../assets/js/estructuras/cola.js"></script>
  <script src="../../assets/js/roles/empleado.js"></script>
  <script>
    document.querySelector("#next").addEventListener("click", async () => {
      try {
        const resultado = await SmartCampusAPI.parseJson(await SmartCampusAPI.atenderSiguienteTurno());
        const turno = resultado.turno || resultado;
        alert(`Turno ${turno.numero || turno.id} asignado para atencion.`);
        window.location.reload();
      } catch (error) {
        alert(error.message);
      }
    });

    document.querySelector('#finalizar-turno').addEventListener('click', async (e) => {
      e.preventDefault();
      try {
        // Intent: marcar el turno activo como finalizado (simulado si no hay API).
        const resp = await SmartCampusAPI.parseJson(await SmartCampusAPI.finalizarTurno());
        alert(resp?.message || 'Turno finalizado correctamente.');
        window.location.reload();
      } catch (err) {
        alert(err?.message || 'Error al finalizar turno');
      }
    });
  </script>
</body>
</html>
