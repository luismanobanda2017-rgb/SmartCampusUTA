<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atender Turno - Empleado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <div id="sc-navbar"></div>

    <main class="container py-4">

      <header class="page-header mb-4">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h1 class="fw-800 mb-1">✅ Atender Turno</h1>
            <p class="text-muted mb-0">Consume el siguiente turno de la cola FIFO y registra la atención.</p>
          </div>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">← Volver</a>
        </div>
      </header>

      <div class="row g-4">
        <!-- Panel: siguiente en cola -->
        <div class="col-lg-5">
          <div class="content-panel h-100">
            <h2 class="h5 mb-3">🎫 Siguiente en cola</h2>
            <div id="turno-actual" class="text-muted small">
              <div class="spinner-block text-center">
                <div class="spinner-border text-primary" role="status"></div>
              </div>
            </div>
            <button id="btn-next" class="btn btn-warning w-100 mt-3">▶ Llamar siguiente turno</button>
          </div>
        </div>

        <!-- Panel: formulario de atención -->
        <div class="col-lg-7">
          <div class="content-panel">
            <h2 class="h5 mb-3">📝 Registro de atención</h2>
            <form id="form-atencion">
              <div class="mb-3">
                <label class="form-label fw-semibold">Estado de atención</label>
                <select id="estado-atencion" class="form-select">
                  <option value="atendido">Atendido</option>
                  <option value="derivado">Derivado</option>
                  <option value="cancelado">Cancelado</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Notas u observaciones</label>
                <textarea id="notas-atencion" class="form-control" rows="5" placeholder="Describe el resultado de la atención..."></textarea>
              </div>
              <button id="btn-finalizar" class="btn btn-primary w-100" disabled>Finalizar turno</button>
            </form>
          </div>
        </div>
      </div>

    </main>

    <footer class="footer text-center mt-4">
      <div class="container"><p class="mb-0">SmartCampus UTA - 2025</p></div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>

  <script type="module">
    import { requireSession } from '../../assets/js/auth.js';
    import { obtenerTurnosPorEstado, atenderSiguienteTurno, finalizarTurno } from '../../../src/Persistence/supabaseClient.js';

    const usuario = requireSession();
    if (!usuario || usuario.rol !== 'empleado') {
      window.location.href = '../../../index.html';
    }

    const elActual    = document.getElementById('turno-actual');
    const btnNext     = document.getElementById('btn-next');
    const btnFin      = document.getElementById('btn-finalizar');
    let turnoActivoId = null;

    async function cargarSiguiente() {
      elActual.innerHTML = '<div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>';
      try {
        const turnos = await obtenerTurnosPorEstado('esperando');
        if (!turnos?.length) {
          elActual.innerHTML = '<p class="text-muted">No hay turnos en espera.</p>';
          btnFin.disabled = true;
          return;
        }
        const t = turnos[0];
        turnoActivoId = t.id;
        elActual.innerHTML = `
          <div class="queue-item">
            <div class="fw-semibold fs-5">${t.usuarios?.nombre || 'Anónimo'}</div>
            <div class="small text-muted mt-1">Servicio: <strong>${t.servicio || 'General'}</strong></div>
            <div class="small text-muted">Registro: ${new Date(t.created_at).toLocaleString('es-EC')}</div>
            <div class="mt-2"><span class="badge-state state-pendiente">esperando</span></div>
          </div>
          <div class="mt-2 small text-muted">${turnos.length - 1} turno(s) más en cola.</div>`;
        btnFin.disabled = false;
      } catch (e) {
        elActual.innerHTML = `<div class="alert alert-danger small">${e.message}</div>`;
      }
    }

    btnNext.addEventListener('click', async () => {
      try {
        const turnos = await obtenerTurnosPorEstado('esperando');
        if (!turnos?.length) { alert('No hay turnos en espera.'); return; }
        await atenderSiguienteTurno(turnos[0].servicio || 'general');
        await cargarSiguiente();
      } catch (e) { alert(e.message); }
    });

    document.getElementById('form-atencion').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!turnoActivoId) { alert('No hay turno activo.'); return; }
      try {
        await finalizarTurno(turnoActivoId);
        turnoActivoId = null;
        btnFin.disabled = true;
        await cargarSiguiente();
        alert('Turno finalizado correctamente.');
      } catch (e) { alert(e.message); }
    });

    btnFin.addEventListener('click', (e) => {
      document.getElementById('form-atencion').dispatchEvent(new Event('submit'));
    });

    document.addEventListener('DOMContentLoaded', cargarSiguiente);
  </script>
</body>
</html>
