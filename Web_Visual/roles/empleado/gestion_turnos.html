<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Turnos - Empleado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <div id="sc-navbar"></div>

    <main class="container py-4">

      <header class="page-header mb-4">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h1 class="fw-800 mb-1">🎫 Gestión de Turnos</h1>
            <p class="text-muted mb-0">Atiende la cola por servicio y administra los estados.</p>
          </div>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">← Volver</a>
        </div>
      </header>

      <!-- Controles -->
      <div class="content-panel mb-4">
        <div class="row g-3 align-items-end">
          <div class="col-auto">
            <label class="form-label fw-semibold mb-1">Servicio</label>
            <select id="servicio" class="form-select form-select-sm" style="min-width:180px;">
              <option value="">Todos los servicios</option>
              <option value="administracion">Administración</option>
              <option value="academico">Académico</option>
              <option value="titulacion">Titulación</option>
              <option value="financiero">Financiero</option>
            </select>
          </div>
          <div class="col-auto">
            <label class="form-label fw-semibold mb-1">Estado</label>
            <select id="estado-filtro" class="form-select form-select-sm" style="min-width:150px;">
              <option value="esperando">En espera</option>
              <option value="atendido">Atendidos</option>
              <option value="todos">Todos</option>
            </select>
          </div>
          <div class="col-auto d-flex gap-2">
            <button id="btn-atender" class="btn btn-primary btn-sm">▶ Atender siguiente</button>
            <button id="btn-refrescar" class="btn btn-outline-secondary btn-sm">↻ Refrescar</button>
          </div>
        </div>
      </div>

      <!-- Contador rápido -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="metric-card p-3">
            <p class="text-muted mb-1 small">En espera</p>
            <div class="value" id="cnt-espera">…</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="metric-card p-3">
            <p class="text-muted mb-1 small">Atendidos hoy</p>
            <div class="value" id="cnt-atendidos">…</div>
          </div>
        </div>
      </div>

      <!-- Lista de turnos -->
      <div class="content-panel">
        <h2 class="h6 mb-3 text-muted">Cola de turnos</h2>
        <div id="lista-turnos">
          <div class="spinner-block text-center">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        </div>
      </div>

    </main>

    <footer class="footer text-center mt-4">
      <div class="container"><p class="mb-0">SmartCampus UTA - 2025</p></div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>

  <script type="module">
    import { requireSession } from '../../assets/js/auth.js';
    import { obtenerTurnosPorEstado, atenderSiguienteTurno, finalizarTurno } from '../../../src/Persistence/supabaseClient.js';
    import { Cola } from '../../../src/Domain/DataStructures/Cola.js';

    const usuario = requireSession();
    if (!usuario || usuario.rol !== 'empleado') {
      window.location.href = '../../../index.html';
    }

    const listaEl   = document.getElementById('lista-turnos');
    const servicioS = document.getElementById('servicio');
    const estadoS   = document.getElementById('estado-filtro');

    async function cargar() {
      listaEl.innerHTML = '<div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>';
      try {
        const estadoVal = estadoS.value === 'todos' ? null : estadoS.value;

        // Carga en espera y atendidos para contadores
        const [enEspera, atendidos] = await Promise.all([
          obtenerTurnosPorEstado('esperando'),
          obtenerTurnosPorEstado('atendido')
        ]);

        document.getElementById('cnt-espera').textContent    = enEspera?.length ?? 0;
        document.getElementById('cnt-atendidos').textContent = atendidos?.length ?? 0;

        // Filtrar según selección
        let base = estadoVal === 'atendido' ? atendidos : enEspera;
        if (estadoS.value === 'todos') base = [...(enEspera || []), ...(atendidos || [])];

        const filtrados = servicioS.value
          ? base.filter(t => t.servicio === servicioS.value)
          : base;

        if (!filtrados.length) {
          listaEl.innerHTML = '<p class="text-muted mb-0">Sin turnos para los filtros seleccionados.</p>';
          return;
        }

        // Usar Cola para ordenar
        const cola = new Cola(filtrados.length);
        filtrados.forEach(t => cola.encolar(t));
        const ordenados = cola.toArray();

        listaEl.innerHTML = `
          <div class="list-group list-group-flush">
            ${ordenados.map((t, i) => `
              <div class="list-group-item px-0 py-3 ${i === 0 && estadoS.value === 'esperando' ? 'border-start border-4 border-warning ps-3' : ''}">
                <div class="d-flex justify-content-between align-items-start gap-2">
                  <div>
                    <div class="fw-semibold">
                      ${t.usuarios?.nombre || 'Anónimo'}
                      ${i === 0 && estadoS.value === 'esperando' ? '<span class="badge bg-warning text-dark ms-2">Siguiente</span>' : ''}
                    </div>
                    <div class="small text-muted mt-1">
                      Servicio: <strong>${t.servicio || 'General'}</strong>
                      · ${new Date(t.created_at).toLocaleString('es-EC')}
                    </div>
                    <div class="mt-1">
                      <span class="badge-state ${t.estado === 'esperando' ? 'state-pendiente' : 'state-atendido'}">${t.estado}</span>
                    </div>
                  </div>
                  ${t.estado === 'esperando' ? `
                    <button class="btn btn-sm btn-outline-danger flex-shrink-0" data-finalizar="${t.id}">Finalizar</button>` : ''}
                </div>
              </div>
            `).join('')}
          </div>`;

      } catch (e) {
        listaEl.innerHTML = `<div class="alert alert-danger small">${e.message}</div>`;
      }
    }

    // Atender siguiente
    document.getElementById('btn-atender').addEventListener('click', async () => {
      const servicio = servicioS.value || 'general';
      try {
        await atenderSiguienteTurno(servicio);
        await cargar();
      } catch (e) { alert(e.message); }
    });

    // Finalizar turno individual
    listaEl.addEventListener('click', async (ev) => {
      const btn = ev.target.closest('[data-finalizar]');
      if (!btn) return;
      if (!confirm('¿Marcar turno como finalizado?')) return;
      try {
        await finalizarTurno(btn.dataset.finalizar);
        await cargar();
      } catch (e) { alert(e.message); }
    });

    document.getElementById('btn-refrescar').addEventListener('click', cargar);
    servicioS.addEventListener('change', cargar);
    estadoS.addEventListener('change', cargar);

    document.addEventListener('DOMContentLoaded', cargar);
  </script>
</body>
</html>
