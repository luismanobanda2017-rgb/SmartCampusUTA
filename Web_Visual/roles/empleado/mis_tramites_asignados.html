<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis trámites asignados - Empleado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/empleado.css">
</head>
<body class="empleado-accent">
  <div class="app-shell">
    <div data-navbar></div>
    <main class="container py-4">
      <div class="page-header">
        <h1>Mis trámites asignados</h1>
        <p class="text-muted">Gestiona y actualiza el estado de los trámites que te han sido asignados.</p>
      </div>
      <section class="content-panel">
        <table class="table table-striped">
          <thead><tr><th>#</th><th>Solicitante</th><th>Trámite</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </section>
    </main>
    <div data-footer></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script type="module" src="../../assets/js/api.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/componentes/navbar.js"></script>
  <script src="../../assets/js/componentes/footer.js"></script>
  <script>
    async function load(){
      const data = await SmartCampusAPI.parseJson(await SmartCampusAPI.obtenerTramitesAsignados());
      const tbody = document.getElementById('tbody');
      if(!data || !data.length) { tbody.innerHTML = '<tr><td colspan="5" class="text-muted">No hay trámites asignados</td></tr>'; return; }
      tbody.innerHTML = data.map((t,i)=>`<tr><td>${i+1}</td><td>${t.solicitante}</td><td>${t.tipo}</td><td>${t.estado}</td><td><button class="btn btn-sm btn-success" onclick="finalizar('${t.id}')">Finalizar</button></td></tr>`).join('');
    }
    function finalizar(id){ alert('Trámite '+id+' finalizado (simulado).'); }
    load();
  </script>
</body>
</html>
