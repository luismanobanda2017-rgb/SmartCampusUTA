<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Trámites - Empleado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="sc-navbar"></div>
<main class="container py-4">
  <header class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h1>📋 Gestión de Trámites</h1>
      <p class="text-muted">Lista de trámites pendientes y opciones para actualizar estado.</p>
    </div>
    <a href="dashboard.html" class="btn btn-outline-secondary">← Volver</a>
  </header>

  <section class="content-panel p-4 mt-3">
    <div id="tramites-list">
      <div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>
    </div>
  </section>
</main>

<footer class="footer text-center mt-4">
  <div class="container"><p class="mb-0">SmartCampus UTA · 2025</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireSession } from '../../assets/js/auth.js';
  import { obtenerTodosTramites, actualizarEstadoTramite } from '../../../src/Persistence/supabaseClient.js';

  const usuario = requireSession();
  if (!usuario || usuario.rol !== 'empleado') { alert('Acceso solo para empleados.'); window.location.href='../../index.html'; }

  const el = document.getElementById('tramites-list');

  async function cargar() {
    el.innerHTML = '<div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>';
    try {
      const tramites = await obtenerTodosTramites();
      const pendientes = tramites.filter(t => t.estado === 'pendiente');
      if (!pendientes.length) { el.innerHTML = '<p class="text-muted">No hay trámites pendientes.</p>'; return; }
      el.innerHTML = `<div class="list-group">${pendientes.map(t=>`<div class="list-group-item d-flex justify-content-between align-items-center">
        <div><strong>${t.tipo}</strong><br><small class="text-muted">${t.usuarios?.nombre||'—'}</small></div>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-success" data-aprobar="${t.id}">Aprobar</button>
          <button class="btn btn-sm btn-danger" data-rechazar="${t.id}">Rechazar</button>
        </div>
      </div>`).join('')}</div>`;
    } catch (e) { el.innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
  }

  el.addEventListener('click', async (ev) => {
    const ap = ev.target.closest('[data-aprobar]');
    const re = ev.target.closest('[data-rechazar]');
    if (ap) {
      try { await actualizarEstadoTramite(ap.dataset.aprobar, 'aprobado', usuario.id); await cargar(); }
      catch (e) { alert(e.message); }
    }
    if (re) {
      try { await actualizarEstadoTramite(re.dataset.rechazar, 'rechazado', usuario.id); await cargar(); }
      catch (e) { alert(e.message); }
    }
  });

  await cargar();
</script>
</body>
</html>
