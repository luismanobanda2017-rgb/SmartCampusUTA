<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Horario de Atención - Empleado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <div id="sc-navbar"></div>

    <main class="container py-4">

      <header class="page-header mb-4">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h1 class="fw-800 mb-1">🕐 Mi Horario de Atención</h1>
            <p class="text-muted mb-0">Define las franjas horarias y días disponibles para tu ventanilla.</p>
          </div>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">← Volver</a>
        </div>
      </header>

      <div class="row g-4">
        <!-- Formulario -->
        <div class="col-lg-5">
          <div class="content-panel">
            <h2 class="h5 mb-3">Agregar franja horaria</h2>
            <form id="horario-form">
              <div class="mb-3">
                <label class="form-label fw-semibold">Día</label>
                <select class="form-select" id="dia">
                  <option value="Lunes">Lunes</option>
                  <option value="Martes">Martes</option>
                  <option value="Miércoles">Miércoles</option>
                  <option value="Jueves">Jueves</option>
                  <option value="Viernes">Viernes</option>
                </select>
              </div>
              <div class="row g-3 mb-3">
                <div class="col-6">
                  <label class="form-label fw-semibold">Inicio</label>
                  <input type="time" class="form-control" id="inicio" value="08:00">
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Fin</label>
                  <input type="time" class="form-control" id="fin" value="12:00">
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100">+ Agregar franja</button>
            </form>
          </div>
        </div>

        <!-- Lista de franjas -->
        <div class="col-lg-7">
          <div class="content-panel">
            <h2 class="h5 mb-3">Franjas registradas</h2>
            <div id="franjas-list">
              <p class="text-muted small">No hay franjas registradas aún.</p>
            </div>
          </div>
        </div>
      </div>

    </main>

    <footer class="footer text-center mt-4">
      <div class="container"><p class="mb-0">SmartCampus UTA - 2025</p></div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>

  <script type="module">
    import { requireSession } from '../../assets/js/auth.js';

    const usuario = requireSession();
    if (!usuario || usuario.rol !== 'empleado') {
      window.location.href = '../../../index.html';
    }

    const franjas = [];
    const listaEl = document.getElementById('franjas-list');

    function renderFranjas() {
      if (!franjas.length) {
        listaEl.innerHTML = '<p class="text-muted small">No hay franjas registradas aún.</p>';
        return;
      }
      listaEl.innerHTML = franjas.map((f, i) => `
        <div class="d-flex justify-content-between align-items-center p-2 mb-2 bg-light rounded">
          <div>
            <strong>${f.dia}</strong>
            <span class="text-muted ms-2 small">${f.inicio} – ${f.fin}</span>
          </div>
          <button class="btn btn-sm btn-outline-danger" data-remove="${i}">✕</button>
        </div>`).join('');
    }

    document.getElementById('horario-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const dia    = document.getElementById('dia').value;
      const inicio = document.getElementById('inicio').value;
      const fin    = document.getElementById('fin').value;
      if (!inicio || !fin) return;
      if (inicio >= fin) { alert('La hora de inicio debe ser antes que la de fin.'); return; }
      franjas.push({ dia, inicio, fin });
      renderFranjas();
    });

    listaEl.addEventListener('click', (ev) => {
      const btn = ev.target.closest('[data-remove]');
      if (!btn) return;
      franjas.splice(Number(btn.dataset.remove), 1);
      renderFranjas();
    });
  </script>
</body>
</html>
