<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horario de atención - Empleado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/empleado.css">
</head>
<body class="empleado-accent">
  <div class="app-shell">
    <div data-navbar></div>
    <main class="container py-4">
      <div class="page-header">
        <h1>Horario de atención</h1>
        <p class="text-muted">Define franjas horarias y días disponibles para tu ventanilla.</p>
      </div>
      <section class="content-panel">
        <form class="row g-3" id="horario-form">
          <div class="col-md-4">
            <label class="form-label">Día</label>
            <select class="form-select" id="dia"><option>Lunes</option><option>Martes</option><option>Miércoles</option></select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Inicio</label>
            <input type="time" class="form-control" id="inicio">
          </div>
          <div class="col-md-3">
            <label class="form-label">Fin</label>
            <input type="time" class="form-control" id="fin">
          </div>
          <div class="col-12">
            <button class="btn btn-primary">Guardar franja</button>
          </div>
        </form>
        <hr>
        <div id="franjas-list"></div>
      </section>
    </main>
    <div data-footer></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script type="module" src="../../assets/js/api.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/componentes/navbar.js"></script>
  <script src="../../assets/js/componentes/footer.js"></script>
  <script>
    document.getElementById('horario-form').addEventListener('submit', (e)=>{e.preventDefault();const d=document.getElementById('dia').value;const i=document.getElementById('inicio').value;const f=document.getElementById('fin').value;const list=document.getElementById('franjas-list');list.innerHTML += `<div class="franja p-2 mb-2 bg-light">${d}: ${i} - ${f}</div>`;});
  </script>
</body>
</html>
