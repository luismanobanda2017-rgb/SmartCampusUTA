<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turnos - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="sc-navbar"></div>
<main class="container py-4">
  <header class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h1>🎫 Gestión de Turnos</h1>
      <p class="text-muted"><strong>Cola FIFO</strong> para atención · <strong>Lista Circular</strong> para rotación de ventanillas.</p>
    </div>
    <a href="dashboard.html" class="btn btn-outline-secondary">← Volver</a>
  </header>

  <!-- Lista Circular - Ventanillas -->
  <section class="content-panel p-4 mb-4">
    <h2 class="h5 mb-2">🔄 Rotación de ventanillas (Lista Circular)</h2>
    <div class="d-flex align-items-center gap-3 flex-wrap">
      <div id="ventanilla-actual" class="badge bg-primary fs-6 p-3">—</div>
      <button class="btn btn-outline-primary" id="btn-rotar">Rotar → siguiente ventanilla</button>
      <small class="text-muted">Asignación Round-Robin entre servicios disponibles.</small>
    </div>
  </section>

  <div class="row g-4">
    <!-- Cola en espera por servicio -->
    <div class="col-md-5">
      <section class="content-panel p-4">
        <h2 class="h5 mb-3">Cola en espera</h2>
        <div class="mb-3">
          <select class="form-select" id="filtro-servicio">
            <option value="secretaria">Secretaría</option>
            <option value="bienestar">Bienestar Estudiantil</option>
            <option value="biblioteca">Biblioteca</option>
            <option value="financiero">Financiero</option>
          </select>
        </div>
        <button class="btn btn-warning w-100 mb-3" id="btn-atender">⚡ Atender siguiente</button>
        <div id="cola-display">
          <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
        </div>
      </section>
    </div>

    <!-- Todos los turnos -->
    <div class="col-md-7">
      <section class="content-panel p-4">
        <h2 class="h5 mb-3">Todos los turnos de hoy</h2>
        <div id="todos-turnos">
          <div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
      </section>
    </div>
  </div>
</main>

<footer class="footer text-center mt-4">
  <div class="container"><p class="mb-0">SmartCampus UTA · 2025</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireSession } from '../../assets/js/auth.js';
  import { obtenerTurnosPorEstado, atenderSiguienteTurno, finalizarTurno } from '../../../src/Persistence/supabaseClient.js';
  import { Cola } from '../../../src/Domain/DataStructures/Cola.js';
  import { ListaCircular } from '../../../src/Domain/DataStructures/ListaCircular.js';

  const usuario = requireSession();
  if (!usuario || usuario.rol !== 'admin') { window.location.href = '../../index.html'; }

  // ── Lista Circular de ventanillas ─────────────────────────────────────────
  const ventanillas = new ListaCircular();
  ['Secretaría', 'Bienestar', 'Biblioteca', 'Financiero'].forEach(v => ventanillas.insertar(v));
  document.getElementById('ventanilla-actual').textContent = ventanillas.actual() || '—';

  document.getElementById('btn-rotar').addEventListener('click', () => {
    const sig = ventanillas.siguiente();
    document.getElementById('ventanilla-actual').textContent = sig;
  });

  // ── Cola FIFO ─────────────────────────────────────────────────────────────
  const estadoBadge = (e) => {
    const cl = { esperando:'warning', atendiendo:'primary', finalizado:'success' };
    return `<span class="badge bg-${cl[e]||'secondary'}">${e}</span>`;
  };

  async function cargarCola() {
    const servicio = document.getElementById('filtro-servicio').value;
    const el = document.getElementById('cola-display');
    try {
      const data = await obtenerTurnosPorEstado('esperando');
      const filtrados = data.filter(t => t.servicio === servicio);
      const cola = new Cola();
      filtrados.forEach(t => cola.encolar(t));
      const items = cola.toArray();
      if (!items.length) { el.innerHTML = '<p class="text-muted">Cola vacía para este servicio.</p>'; return; }
      el.innerHTML = items.map((t, i) => `
        <div class="queue-item mb-2">
          <div class="d-flex justify-content-between">
            <strong>${i===0?'🟢 Siguiente: ':''}Turno #${t.numero_turno}</strong>
            ${estadoBadge(t.estado)}
          </div>
          <p class="mb-0 text-muted small">Posición FIFO: ${i+1} · ${t.usuarios?.nombre||'Usuario'}</p>
        </div>`).join('');
    } catch (e) { el.innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
  }

  async function cargarTodos() {
    const el = document.getElementById('todos-turnos');
    try {
      const [esperando, atendiendo, finalizado] = await Promise.all([
        obtenerTurnosPorEstado('esperando'),
        obtenerTurnosPorEstado('atendiendo'),
        obtenerTurnosPorEstado('finalizado')
      ]);
      const todos = [...atendiendo, ...esperando, ...finalizado];
      if (!todos.length) { el.innerHTML = '<p class="text-muted">Sin turnos hoy.</p>'; return; }
      el.innerHTML = `<div class="table-responsive"><table class="table table-sm">
        <thead><tr><th>#</th><th>Servicio</th><th>Estado</th><th>Usuario</th><th>Acción</th></tr></thead>
        <tbody>${todos.map(t => `<tr>
          <td>${t.numero_turno}</td>
          <td>${t.servicio}</td>
          <td>${estadoBadge(t.estado)}</td>
          <td>${t.usuarios?.nombre||'-'}</td>
          <td>${t.estado==='atendiendo'?`<button class="btn btn-success btn-sm" data-finalizar="${t.id}">Finalizar</button>`:'—'}</td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    } catch (e) { el.innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
  }

  document.getElementById('filtro-servicio').addEventListener('change', cargarCola);

  document.getElementById('btn-atender').addEventListener('click', async () => {
    const servicio = document.getElementById('filtro-servicio').value;
    try {
      const turno = await atenderSiguienteTurno(servicio);
      alert(`✅ Atendiendo turno #${turno.numero_turno}`);
      await Promise.all([cargarCola(), cargarTodos()]);
    } catch (e) { alert(e.message); }
  });

  document.getElementById('todos-turnos').addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-finalizar]');
    if (!btn) return;
    try {
      await finalizarTurno(btn.dataset.finalizar);
      await Promise.all([cargarCola(), cargarTodos()]);
    } catch (err) { alert(err.message); }
  });

  await Promise.all([cargarCola(), cargarTodos()]);
</script>
</body>
</html>
