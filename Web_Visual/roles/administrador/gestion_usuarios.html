<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="sc-navbar"></div>
<main class="container py-4">
  <header class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h1>👥 Gestión de Usuarios</h1>
      <p class="text-muted">Lista secuencial de usuarios registrados en el sistema.</p>
    </div>
    <a href="dashboard.html" class="btn btn-outline-secondary">← Volver</a>
  </header>

  <section class="content-panel p-4">
    <div class="d-flex justify-content-between mb-3">
      <h2 class="h5 mb-0">Usuarios registrados</h2>
      <input class="form-control w-auto" id="buscador" type="search" placeholder="Buscar por nombre o email...">
    </div>
    <div id="tabla-usuarios">
      <div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>
    </div>
  </section>
</main>

<footer class="footer text-center mt-4">
  <div class="container"><p class="mb-0">SmartCampus UTA · 2025</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireSession } from '../../assets/js/auth.js';
  import { obtenerTodosUsuarios, actualizarRolUsuario, eliminarUsuario } from '../../../src/Persistence/supabaseClient.js';
  import { ListaSecuencial } from '../../../src/Domain/DataStructures/ListaSecuencial.js';

  const usuario = requireSession();
  if (!usuario || usuario.rol !== 'admin') { window.location.href = '../../index.html'; }

  const listaSecuencial = new ListaSecuencial();
  const el = document.getElementById('tabla-usuarios');

  function render(items) {
    if (!items.length) { el.innerHTML = '<p class="text-muted">Sin resultados.</p>'; return; }
    el.innerHTML = `<div class="table-responsive"><table class="table table-sm table-hover">
      <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Registrado</th><th>Acciones</th></tr></thead>
      <tbody>${items.map(u => `<tr>
        <td>${u.nombre}</td>
        <td>${u.email}</td>
        <td><span class="badge ${u.rol==='admin'?'bg-danger': u.rol==='empleado'?'bg-warning text-dark':'bg-secondary'}">${u.rol}</span></td>
        <td>${new Date(u.created_at).toLocaleDateString('es-EC')}</td>
        <td>
          <select class="form-select form-select-sm w-auto me-2" data-cambio-rol="${u.id}">
            <option value="estudiante" ${u.rol==='estudiante'?'selected':''}>Estudiante</option>
            <option value="empleado" ${u.rol==='empleado'?'selected':''}>Empleado</option>
            <option value="admin" ${u.rol==='admin'?'selected':''}>Administrador</option>
          </select>
          <button class="btn btn-outline-danger btn-sm" data-eliminar="${u.id}">✕</button>
        </td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  async function cargar() {
    try {
      const data = await obtenerTodosUsuarios();
      listaSecuencial.datos = data;
      render(data);
    } catch (e) {
      el.innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
    }
  }

  document.getElementById('buscador').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    const filtrados = listaSecuencial.datos.filter(u =>
      u.nombre.toLowerCase().includes(q) || u.email.toLowerCase().includes(q));
    render(filtrados);
  });

  // Manejar cambio explícito de rol desde el select y eliminación
  el.addEventListener('change', async (e) => {
    const sel = e.target.closest('[data-cambio-rol]');
    if (sel) {
      const nuevoRol = sel.value;
      if (!confirm(`¿Cambiar rol de este usuario a "${nuevoRol}"?`)) { await cargar(); return; }
      try {
        await actualizarRolUsuario(sel.dataset.cambioRol, nuevoRol);
        await cargar();
      } catch (err) { alert(err.message); }
    }
  });

  el.addEventListener('click', async (e) => {
    const btnDel = e.target.closest('[data-eliminar]');
    if (btnDel) {
      if (confirm('¿Eliminar este usuario? Esta acción no se puede deshacer.')) {
        await eliminarUsuario(btnDel.dataset.eliminar);
        await cargar();
      }
    }
  });

  await cargar();
</script>
</body>
</html>
