<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion de empleados - Administrador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body class="admin-accent">
  <div class="app-shell">
    <div data-navbar></div>
    <main class="container py-4">
      <div class="page-header">
        <h1>Gestion de empleados</h1>
        <p class="text-muted">Los estudiantes se registran publicamente. Los empleados solo se crean desde administracion.</p>
      </div>

      <div class="row g-3">
        <div class="col-lg-5">
          <section class="content-panel">
            <h2 class="h5">Crear empleado</h2>
            <form id="empleado-form">
              <label class="form-label" for="nombre">Nombre completo</label>
              <input class="form-control mb-3" id="nombre" name="nombre" required>

              <label class="form-label" for="email">Correo institucional</label>
              <input class="form-control mb-3" id="email" name="email" type="email" required>

              <label class="form-label" for="telefono">Telefono</label>
              <input class="form-control mb-3" id="telefono" name="telefono">

              <label class="form-label" for="cargo">Cargo</label>
              <select class="form-select mb-3" id="cargo" name="cargo" required>
                <option>Profesor</option>
                <option>Secretaria</option>
                <option>Coordinador</option>
                <option>Administrativo</option>
                <option>Personal institucional</option>
              </select>

              <label class="form-label" for="departamento">Departamento</label>
              <input class="form-control mb-3" id="departamento" name="departamento" placeholder="FISEI" required>

              <label class="form-label" for="password">Contrasena temporal</label>
              <input class="form-control mb-3" id="password" name="password" type="password" minlength="6" required>

              <button class="btn btn-warning w-100">Crear empleado</button>
            </form>
            <div id="empleado-alert" class="mt-3"></div>
          </section>
        </div>

        <div class="col-lg-7">
          <section class="table-wrap">
            <div class="d-flex flex-wrap gap-2 justify-content-between mb-3">
              <h2 class="h5 mb-0">Usuarios del sistema</h2>
              <button class="btn btn-outline-primary btn-sm" id="reload-users">Actualizar</button>
            </div>
            <table class="table align-middle">
              <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th></tr></thead>
              <tbody id="usuarios-body"></tbody>
            </table>
          </section>
        </div>
      </div>
    </main>
    <div data-footer></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/componentes/navbar.js"></script>
  <script src="../../assets/js/componentes/footer.js"></script>
  <script>
    const roles = { 1: "administrador", 2: "empleado", 3: "estudiante" };

    async function cargarUsuarios() {
  const body = document.querySelector("#usuarios-body");
  body.innerHTML = `<tr><td colspan="4">${SmartCampusUtils.loading("Cargando usuarios...")}</td></tr>`;
  try {
        const users = await SmartCampusAPI.parseJson(await SmartCampusAPI.listarUsuarios());
        body.innerHTML = users.map((u) => `
          <tr>
            <td>${u.nombre}</td>
            <td>${u.email}</td>
            <td>${roles[u.rolId || u.rol_id] || "sin rol"}</td>
            <td>${u.activo ? "Activo" : "Inactivo"}</td>
          </tr>
        `).join("");
      } catch (error) {
        body.innerHTML = `<tr><td colspan="4"><div class="alert alert-danger">${error.message}</div></td></tr>`;
      }
  }

  document.addEventListener("DOMContentLoaded", cargarUsuarios);
  document.querySelector("#reload-users").addEventListener("click", cargarUsuarios);
    document.querySelector("#empleado-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = SmartCampusUtils.formData(event.target);
      try {
        await SmartCampusAPI.parseJson(await SmartCampusAPI.crearEmpleado(data));
        SmartCampusUtils.showAlert("#empleado-alert", "Empleado creado correctamente.", "success");
        event.target.reset();
        cargarUsuarios();
      } catch (error) {
        SmartCampusUtils.showAlert("#empleado-alert", error.message, "danger");
      }
    });
  </script>
</body>
</html>
