<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <div id="sc-navbar"></div>

    <main class="container py-4">

      <header class="page-header mb-4">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h1 class="fw-800 mb-1">👥 Gestión de Usuarios</h1>
            <p class="text-muted mb-0">Lista secuencial de usuarios registrados en el sistema.</p>
          </div>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">← Volver</a>
        </div>
      </header>

      <!-- KPIs rápidos -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="metric-card p-3">
            <p class="text-muted mb-1 small">Total usuarios</p>
            <div class="value" id="cnt-total">…</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="metric-card p-3">
            <p class="text-muted mb-1 small">Estudiantes</p>
            <div class="value" id="cnt-estudiantes">…</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="metric-card p-3">
            <p class="text-muted mb-1 small">Empleados</p>
            <div class="value" id="cnt-empleados">…</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="metric-card p-3">
            <p class="text-muted mb-1 small">Admins</p>
            <div class="value" id="cnt-admins">…</div>
          </div>
        </div>
      </div>

      <!-- Filtro + búsqueda -->
      <div class="content-panel mb-4">
        <div class="row g-2 align-items-center">
          <div class="col-auto">
            <select class="form-select form-select-sm" id="filtro-rol" style="min-width:150px">
              <option value="">Todos los roles</option>
              <option value="estudiante">Estudiante</option>
              <option value="empleado">Empleado</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <div class="col">
            <input class="form-control form-control-sm" id="buscador" type="search" placeholder="Buscar por nombre o email...">
          </div>
          <div class="col-auto">
            <button class="btn btn-outline-secondary btn-sm" id="btn-refrescar">↻ Actualizar</button>
          </div>
        </div>
      </div>

      <!-- Tabla de usuarios -->
      <div class="content-panel">
        <div id="tabla-usuarios">
          <div class="spinner-block text-center">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        </div>
      </div>

    </main>

    <footer class="footer text-center mt-4">
      <div class="container"><p class="mb-0">SmartCampus UTA - 2025</p></div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>

  <script type="module">
    import { requireSession } from '../../assets/js/auth.js';
    import { obtenerTodosUsuarios, actualizarRolUsuario, eliminarUsuario } from '../../../src/Persistence/supabaseClient.js';
    import { ListaSecuencial } from '../../../src/Domain/DataStructures/ListaSecuencial.js';

    const usuario = requireSession();
    if (!usuario || usuario.rol !== 'admin') { window.location.href = '../../../index.html'; }

    const listaSecuencial = new ListaSecuencial();
    const el = document.getElementById('tabla-usuarios');

    const rolBadge = (rol) => {
      const map = { admin: 'bg-danger', empleado: 'bg-warning text-dark', estudiante: 'bg-secondary' };
      return `<span class="badge ${map[rol] || 'bg-light text-dark'}">${rol}</span>`;
    };

    function render(items) {
      if (!items.length) {
        el.innerHTML = '<p class="text-muted mb-0">Sin resultados.</p>';
        return;
      }
      el.innerHTML = `
        <div class="text-muted small mb-2">${items.length} usuario(s)</div>
        <div class="table-responsive">
          <table class="table table-sm table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th class="small text-muted">Nombre</th>
                <th class="small text-muted">Email</th>
                <th class="small text-muted">Rol</th>
                <th class="small text-muted">Registrado</th>
                <th class="small text-muted">Acciones</th>
              </tr>
            </thead>
            <tbody>
              ${items.map(u => `
                <tr>
                  <td class="fw-semibold">${u.nombre}</td>
                  <td class="small text-muted">${u.email}</td>
                  <td>${rolBadge(u.rol)}</td>
                  <td class="small text-muted">${new Date(u.created_at).toLocaleDateString('es-EC')}</td>
                  <td>
                    <div class="d-flex gap-1 align-items-center">
                      <select class="form-select form-select-sm" data-cambio-rol="${u.id}" style="min-width:130px">
                        <option value="estudiante" ${u.rol === 'estudiante' ? 'selected' : ''}>Estudiante</option>
                        <option value="empleado"   ${u.rol === 'empleado'   ? 'selected' : ''}>Empleado</option>
                        <option value="admin"      ${u.rol === 'admin'      ? 'selected' : ''}>Admin</option>
                      </select>
                      <button class="btn btn-outline-danger btn-sm" data-eliminar="${u.id}" title="Eliminar">✕</button>
                    </div>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    async function cargar() {
      el.innerHTML = '<div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>';
      try {
        const data = await obtenerTodosUsuarios();
        listaSecuencial.datos = data;

        // KPIs
        document.getElementById('cnt-total').textContent      = data.length;
        document.getElementById('cnt-estudiantes').textContent = data.filter(u => u.rol === 'estudiante').length;
        document.getElementById('cnt-empleados').textContent   = data.filter(u => u.rol === 'empleado').length;
        document.getElementById('cnt-admins').textContent      = data.filter(u => u.rol === 'admin').length;

        aplicarFiltros();
      } catch (e) {
        el.innerHTML = `<div class="alert alert-danger small">${e.message}</div>`;
      }
    }

    function aplicarFiltros() {
      const rol = document.getElementById('filtro-rol').value;
      const q   = document.getElementById('buscador').value.toLowerCase();
      const filtrados = (listaSecuencial.datos || []).filter(u =>
        (!rol || u.rol === rol) &&
        (!q || u.nombre.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)));
      render(filtrados);
    }

    document.getElementById('filtro-rol').addEventListener('change', aplicarFiltros);
    document.getElementById('buscador').addEventListener('input', aplicarFiltros);
    document.getElementById('btn-refrescar').addEventListener('click', cargar);

    // Cambio de rol
    el.addEventListener('change', async (e) => {
      const sel = e.target.closest('[data-cambio-rol]');
      if (!sel) return;
      const nuevoRol = sel.value;
      if (!confirm(`¿Cambiar rol a "${nuevoRol}"?`)) { await cargar(); return; }
      try {
        await actualizarRolUsuario(sel.dataset.cambioRol, nuevoRol);
        await cargar();
      } catch (err) { alert(err.message); }
    });

    // Eliminar usuario
    el.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-eliminar]');
      if (!btn) return;
      if (!confirm('¿Eliminar este usuario? Esta acción no se puede deshacer.')) return;
      try {
        await eliminarUsuario(btn.dataset.eliminar);
        await cargar();
      } catch (err) { alert(err.message); }
    });

    document.addEventListener('DOMContentLoaded', cargar);
  </script>
</body>
</html>
