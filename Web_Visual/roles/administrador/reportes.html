<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="sc-navbar"></div>
<main class="container py-4">
  <header class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h1>📊 Reportes del Sistema</h1>
      <p class="text-muted">Métricas y estadísticas del SmartCampus UTA.</p>
    </div>
    <a href="dashboard.html" class="btn btn-outline-secondary">← Volver</a>
  </header>

  <!-- KPIs -->
  <div class="row g-3 mb-4" id="kpis">
    <div class="col-md-2"><div class="metric-card p-3 text-center"><p class="text-muted mb-1 small">Usuarios</p><div class="value" id="r-usuarios">…</div></div></div>
    <div class="col-md-2"><div class="metric-card p-3 text-center"><p class="text-muted mb-1 small">Admins</p><div class="value" id="r-admins">…</div></div></div>
    <div class="col-md-2"><div class="metric-card p-3 text-center"><p class="text-muted mb-1 small">Trámites</p><div class="value" id="r-tramites">…</div></div></div>
    <div class="col-md-2"><div class="metric-card p-3 text-center"><p class="text-muted mb-1 small">Pendientes</p><div class="value" id="r-pendientes">…</div></div></div>
    <div class="col-md-2"><div class="metric-card p-3 text-center"><p class="text-muted mb-1 small">Turnos hoy</p><div class="value" id="r-turnos">…</div></div></div>
    <div class="col-md-2"><div class="metric-card p-3 text-center"><p class="text-muted mb-1 small">Nodos campus</p><div class="value" id="r-nodos">…</div></div></div>
  </div>

  <div class="row g-4">
    <!-- Trámites por tipo -->
    <div class="col-md-6">
      <section class="content-panel p-4">
        <h2 class="h5 mb-3">Trámites por tipo</h2>
        <div id="tramites-tipo"></div>
      </section>
    </div>
    <!-- Turnos por servicio -->
    <div class="col-md-6">
      <section class="content-panel p-4">
        <h2 class="h5 mb-3">Turnos por servicio</h2>
        <div id="turnos-servicio"></div>
      </section>
    </div>
  </div>

  <!-- Bitácora completa -->
  <section class="content-panel p-4 mt-4">
    <div class="d-flex justify-content-between mb-3">
      <h2 class="h5 mb-0">Bitácora de acciones</h2>
      <button class="btn btn-outline-secondary btn-sm" id="btn-exportar">📥 Exportar CSV</button>
    </div>
    <div id="bitacora-completa">
      <div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>
    </div>
  </section>
</main>

<footer class="footer text-center mt-4">
  <div class="container"><p class="mb-0">SmartCampus UTA · 2025</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireSession } from '../../assets/js/auth.js';
  import { obtenerTodosUsuarios, obtenerTodosTramites, obtenerTurnosPorEstado, obtenerNodosCampus, obtenerHistorialAcciones } from '../../../src/Persistence/supabaseClient.js';
  import { Pila } from '../../../src/Domain/DataStructures/Pila.js';

  const usuario = requireSession();
  if (!usuario || usuario.rol !== 'admin') { window.location.href = '../../index.html'; }

  function barChart(data, labelKey, valueKey, color='var(--uta-blue)') {
    const max = Math.max(...data.map(d=>d[valueKey]),1);
    return data.map(d=>`
      <div class="d-flex align-items-center gap-2 mb-2">
        <span style="width:120px;font-size:.85rem">${d[labelKey]}</span>
        <div style="flex:1;background:#f5f5f5;border-radius:4px;height:20px">
          <div style="width:${(d[valueKey]/max*100).toFixed(0)}%;background:${color};height:100%;border-radius:4px;transition:width .5s"></div>
        </div>
        <span style="width:30px;font-size:.85rem;font-weight:700">${d[valueKey]}</span>
      </div>`).join('');
  }

  try {
    const [usuarios, tramites, turnosEsp, turnosAten, turnosFin, nodos, acciones] = await Promise.all([
      obtenerTodosUsuarios(), obtenerTodosTramites(),
      obtenerTurnosPorEstado('esperando'), obtenerTurnosPorEstado('atendiendo'),
      obtenerTurnosPorEstado('finalizado'), obtenerNodosCampus(),
      obtenerHistorialAcciones(100)
    ]);

    document.getElementById('r-usuarios').textContent = usuarios.length;
    document.getElementById('r-admins').textContent = usuarios.filter(u=>u.rol==='admin').length;
    document.getElementById('r-tramites').textContent = tramites.length;
    document.getElementById('r-pendientes').textContent = tramites.filter(t=>t.estado==='pendiente').length;
    document.getElementById('r-turnos').textContent = turnosEsp.length + turnosAten.length + turnosFin.length;
    document.getElementById('r-nodos').textContent = nodos.length;

    // Trámites por tipo
    const porTipo = {};
    tramites.forEach(t=>{ porTipo[t.tipo]=(porTipo[t.tipo]||0)+1; });
    document.getElementById('tramites-tipo').innerHTML = barChart(
      Object.entries(porTipo).map(([tipo,count])=>({tipo,count})), 'tipo', 'count');

    // Turnos por servicio
    const todosTurnos = [...turnosEsp,...turnosAten,...turnosFin];
    const porServicio = {};
    todosTurnos.forEach(t=>{ porServicio[t.servicio]=(porServicio[t.servicio]||0)+1; });
    document.getElementById('turnos-servicio').innerHTML = barChart(
      Object.entries(porServicio).map(([servicio,count])=>({servicio,count})), 'servicio', 'count', 'var(--fisei-orange)');

    // Bitácora con Pila (últimas 5 acciones)
    const pila = new Pila(5);
    acciones.forEach(a => pila.apilar(a));
    const ultimas5 = pila.toArray();

    const bitEl = document.getElementById('bitacora-completa');
    if (!ultimas5.length) { bitEl.innerHTML='<p class="text-muted">Sin acciones registradas.</p>'; }
    else {
      bitEl.innerHTML = `<div class="table-responsive"><table class="table table-sm">
        <thead><tr><th>Acción</th><th>Descripción</th><th>Usuario</th><th>Fecha</th></tr></thead>
        <tbody>${ultimas5.map(a=>`<tr>
          <td><strong>${a.tipo_accion||'—'}</strong></td>
          <td>${a.descripcion||'—'}</td>
          <td>${a.usuarios?.nombre||'—'}</td>
          <td>${new Date(a.created_at).toLocaleString('es-EC')}</td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    }

    // Exportar CSV
    document.getElementById('btn-exportar').addEventListener('click', () => {
      const csv = ['Accion,Descripcion,Usuario,Fecha',
        ...acciones.map(a=>`${a.tipo_accion||''},${(a.descripcion||'').replace(/,/g,';')},${a.usuarios?.nombre||''},${a.created_at}`)
      ].join('\n');
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download='bitacora_smartcampus.csv'; a.click();
    });

  } catch(e) {
    document.getElementById('bitacora-completa').innerHTML=`<div class="alert alert-danger">${e.message}</div>`;
  }
</script>
</body>
</html>
