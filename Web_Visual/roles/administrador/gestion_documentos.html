<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion de documentos - Administrador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body class="admin-accent"><div class="app-shell"><div data-navbar></div><main class="container py-4"><div class="page-header"><h1>Gestion de documentos</h1><p class="text-muted">Administracion del arbol documental institucional.</p></div><section class="content-panel"><div class="d-flex gap-2 mb-3"><button class="btn btn-warning">Subir documento</button><button class="btn btn-outline-primary">Nuevo nodo</button></div><div data-tree></div></section></main><div data-footer></div></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../../assets/js/config.js"></script><script src="../../assets/js/utils.js"></script><script type="module" src="../../assets/js/api.js"></script><script type="module" src="../../assets/js/auth.js"></script><script src="../../assets/js/componentes/navbar.js"></script><script src="../../assets/js/componentes/footer.js"></script><script>function tree(n){return `<div class="tree-node mb-2"><strong>${n.categoria.nombre}</strong>${n.hijos?.length?`<div class="tree-children mt-2">${n.hijos.map(tree).join("")}</div>`:""}</div>`}document.addEventListener("DOMContentLoaded",async()=>{document.querySelector("[data-tree]").innerHTML=tree(await SmartCampusAPI.parseJson(await SmartCampusAPI.obtenerArbolDocumentos()))});</script></body>
</html>
