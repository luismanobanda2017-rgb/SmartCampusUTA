<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion de tramites - Administrador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body class="admin-accent">
  <div class="app-shell">
    <div data-navbar></div>
    <main class="container py-4">
      <div class="page-header">
        <h1>Gestion de tramites</h1>
        <p class="text-muted">Consulta global de solicitudes, responsables y estados.</p>
      </div>
      <section class="table-wrap">
        <table class="table">
          <thead>
            <tr><th>Fecha</th><th>Tipo</th><th>Responsable</th><th>Estado</th><th>Asignacion</th><th></th></tr>
          </thead>
          <tbody data-tramites></tbody>
        </table>
      </section>
    </main>
    <div data-footer></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script type="module" src="../../assets/js/api.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/componentes/navbar.js"></script>
  <script src="../../assets/js/componentes/footer.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const target = document.querySelector("[data-tramites]");
      try {
        const [data, usuarios] = await Promise.all([
          SmartCampusAPI.parseJson(await SmartCampusAPI.obtenerHistorialTramites()),
          SmartCampusAPI.parseJson(await SmartCampusAPI.listarUsuarios())
        ]);
        const empleados = usuarios.filter((u) => Number(u.rolId || u.rol_id) === 2);
        const opciones = (selected) => empleados
          .map((e) => `<option value="${e.id}" ${Number(selected) === Number(e.id) ? "selected" : ""}>${e.nombre}</option>`)
          .join("");
        target.innerHTML = data.length ? data.map((t) => `
          <tr>
            <td>${(t.fechaSolicitud || "").toString().replace("T", " ")}</td>
            <td>Tipo ${t.tipoTramiteId || "-"}</td>
            <td>${t.empleadoId ? `Empleado ${t.empleadoId}` : "Sin asignar"}</td>
            <td>${SmartCampusUtils.stateBadge(t.estado || "pendiente")}</td>
            <td>
              <form class="d-flex gap-2" data-asignar-tramite="${t.id}">
                <select class="form-select form-select-sm" name="empleadoId" required>
                  <option value="">Seleccionar</option>
                  ${opciones(t.empleadoId)}
                </select>
                <button class="btn btn-sm btn-primary">Asignar</button>
              </form>
            </td>
            <td><a class="btn btn-sm btn-outline-primary" href="../../tramites/detalle_tramite.html?id=${t.id}">Detalle</a></td>
          </tr>
        `).join("") : `<tr><td colspan="6" class="text-muted">No hay tramites registrados.</td></tr>`;
      } catch (error) {
        target.innerHTML = `<tr><td colspan="6" class="text-danger">${error.message}</td></tr>`;
      }
    });

    document.addEventListener("submit", async (event) => {
      const form = event.target.closest("[data-asignar-tramite]");
      if (!form) return;
      event.preventDefault();
      const tramiteId = Number(form.dataset.asignarTramite);
      const empleadoId = Number(new FormData(form).get("empleadoId"));
      if (!empleadoId) return;
      try {
        await SmartCampusAPI.parseJson(await SmartCampusAPI.asignarEmpleadoTramite(tramiteId, empleadoId));
        window.location.reload();
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>
