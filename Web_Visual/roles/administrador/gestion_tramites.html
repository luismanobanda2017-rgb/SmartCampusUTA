<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trámites - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <div id="sc-navbar"></div>

    <main class="container py-4">

      <header class="page-header mb-4">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h1 class="fw-800 mb-1">📋 Gestión de Trámites</h1>
            <p class="text-muted mb-0">Lista doblemente enlazada para navegación bidireccional en expedientes.</p>
          </div>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">← Volver</a>
        </div>
      </header>

      <!-- Filtros y búsqueda -->
      <div class="content-panel mb-4">
        <div class="row g-2 align-items-center">
          <div class="col-auto">
            <select class="form-select form-select-sm" id="filtro-estado" style="min-width:160px">
              <option value="">Todos los estados</option>
              <option value="pendiente">Pendiente</option>
              <option value="en_proceso">En proceso</option>
              <option value="completado">Completado</option>
              <option value="rechazado">Rechazado</option>
            </select>
          </div>
          <div class="col">
            <input class="form-control form-control-sm" id="buscador" type="search" placeholder="Buscar por tipo o descripción...">
          </div>
          <div class="col-auto d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm" id="btn-anterior">← Anterior</button>
            <button class="btn btn-outline-secondary btn-sm" id="btn-siguiente">Siguiente →</button>
          </div>
          <div class="col-auto">
            <button class="btn btn-outline-secondary btn-sm" id="btn-refrescar">↻</button>
          </div>
        </div>
      </div>

      <!-- Navegador ListaDoble -->
      <div id="detalle-navegacion" class="mock-note mb-3" hidden>
        <strong>Expediente (navegación ListaDoble):</strong>
        <span id="expediente-info"></span>
      </div>

      <!-- Tabla -->
      <div class="content-panel">
        <div id="tabla-tramites">
          <div class="spinner-block text-center">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        </div>
      </div>

    </main>

    <footer class="footer text-center mt-4">
      <div class="container"><p class="mb-0">SmartCampus UTA - 2025</p></div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>

  <script type="module">
    import { requireSession } from '../../assets/js/auth.js';
    import { obtenerTodosTramites, actualizarEstadoTramite } from '../../../src/Persistence/supabaseClient.js';
    import { ListaDoble } from '../../../src/Domain/DataStructures/ListaDoble.js';

    const usuario = requireSession();
    if (!usuario || usuario.rol !== 'admin') { window.location.href = '../../../index.html'; }

    const listaDoble    = new ListaDoble();
    const el            = document.getElementById('tabla-tramites');
    let   todosTramites = [];

    const estadoBadge = (e) => {
      const map = {
        pendiente:  'state-pendiente',
        en_proceso: 'state-en-revision',
        completado: 'state-atendido',
        rechazado:  'state-cancelado',
      };
      return `<span class="badge-state ${map[e] || ''}">${e}</span>`;
    };

    function render(items) {
      if (!items.length) {
        el.innerHTML = '<p class="text-muted mb-0">Sin trámites para mostrar.</p>';
        return;
      }
      el.innerHTML = `
        <div class="text-muted small mb-2">${items.length} trámite(s)</div>
        <div class="table-responsive">
          <table class="table table-sm table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th class="small text-muted">Tipo</th>
                <th class="small text-muted">Descripción</th>
                <th class="small text-muted">Estado</th>
                <th class="small text-muted">Usuario</th>
                <th class="small text-muted">Fecha</th>
                <th class="small text-muted">Cambiar estado</th>
              </tr>
            </thead>
            <tbody>
              ${items.map(t => `
                <tr>
                  <td class="fw-semibold">${t.tipo || '—'}</td>
                  <td class="text-muted small">${t.descripcion || '—'}</td>
                  <td>${estadoBadge(t.estado)}</td>
                  <td class="small">${t.usuarios?.nombre || '—'}</td>
                  <td class="small text-muted">${new Date(t.created_at).toLocaleDateString('es-EC')}</td>
                  <td>
                    <select class="form-select form-select-sm" data-tramite="${t.id}" style="min-width:130px">
                      <option value="">Cambiar...</option>
                      <option value="en_proceso"  ${t.estado === 'en_proceso'  ? 'selected' : ''}>En proceso</option>
                      <option value="completado"  ${t.estado === 'completado'  ? 'selected' : ''}>Completado</option>
                      <option value="rechazado"   ${t.estado === 'rechazado'   ? 'selected' : ''}>Rechazado</option>
                    </select>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    async function cargar() {
      el.innerHTML = '<div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>';
      try {
        todosTramites = await obtenerTodosTramites();
        // Reconstruir ListaDoble
        listaDoble.cabeza  = null;
        listaDoble.cola    = null;
        listaDoble.tamano  = 0;
        listaDoble._cursor = null;
        todosTramites.forEach(t => listaDoble.insertar(t));
        aplicarFiltros();
      } catch (e) {
        el.innerHTML = `<div class="alert alert-danger small">${e.message}</div>`;
      }
    }

    function aplicarFiltros() {
      const estado = document.getElementById('filtro-estado').value;
      const q      = document.getElementById('buscador').value.toLowerCase();
      const filtrados = todosTramites.filter(t =>
        (!estado || t.estado === estado) &&
        (!q || (t.tipo || '').toLowerCase().includes(q) || (t.descripcion || '').toLowerCase().includes(q)));
      render(filtrados);
    }

    document.getElementById('filtro-estado').addEventListener('change', aplicarFiltros);
    document.getElementById('buscador').addEventListener('input', aplicarFiltros);
    document.getElementById('btn-refrescar').addEventListener('click', cargar);

    // Navegación ListaDoble
    function mostrarCursor(dato) {
      if (!dato) return;
      document.getElementById('expediente-info').textContent =
        ` ${dato.tipo} — ${dato.descripcion || 'Sin desc.'} (${dato.estado})`;
      document.getElementById('detalle-navegacion').hidden = false;
    }
    document.getElementById('btn-siguiente').addEventListener('click', () => mostrarCursor(listaDoble.siguiente?.()));
    document.getElementById('btn-anterior').addEventListener('click', () => mostrarCursor(listaDoble.anterior?.()));

    // Cambiar estado
    el.addEventListener('change', async (e) => {
      const sel = e.target.closest('[data-tramite]');
      if (!sel || !sel.value) return;
      try {
        await actualizarEstadoTramite(sel.dataset.tramite, sel.value, usuario.id);
        await cargar();
      } catch (err) { alert(err.message); }
    });

    document.addEventListener('DOMContentLoaded', cargar);
  </script>
</body>
</html>
