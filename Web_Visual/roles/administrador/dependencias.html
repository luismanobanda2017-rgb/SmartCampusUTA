<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dependencias Institucionales - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .tree-root { list-style:none; padding:0; margin:0; }
    .tree-children { list-style:none; padding-left:1.2rem; margin-top:0.3rem; border-left:2px solid var(--line); }
    .tree-node { margin-bottom:0.4rem; }
    .tree-label { cursor:pointer; padding:0.3rem 0.6rem; border-radius:6px; display:inline-block; }
  </style>
</head>
<body>
<div id="sc-navbar"></div>
<main class="container py-4">
  <header class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h1>🌳 Estructura de Dependencias</h1>
      <p class="text-muted">Visualiza la jerarquía institucional (organigrama/dependencias).</p>
    </div>
    <a href="dashboard.html" class="btn btn-outline-secondary">← Volver</a>
  </header>

  <section class="content-panel p-4 mt-3">
    <div class="d-flex justify-content-between mb-3">
      <div>
        <button id="btn-bfs" class="btn btn-outline-secondary btn-sm">BFS</button>
        <button id="btn-dfs" class="btn btn-outline-secondary btn-sm">DFS</button>
      </div>
    </div>
    <div id="tree-container">
      <div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>
    </div>
    <div id="recorrido" class="mt-3 mock-note" hidden></div>
  </section>
</main>

<footer class="footer text-center mt-4">
  <div class="container"><p class="mb-0">SmartCampus UTA · 2025</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireSession } from '../../assets/js/auth.js';
  import { obtenerDependenciasInstitucionales } from '../../../src/Persistence/supabaseClient.js';
  import { Arbol } from '../../../src/Domain/DataStructures/Arbol.js';

  const usuario = requireSession();
  if (!usuario || usuario.rol !== 'admin') { window.location.href = '../../index.html'; }

  const treeEl = document.getElementById('tree-container');
  let arbol = new Arbol();

  async function cargar() {
    treeEl.innerHTML = '<div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>';
    try {
      const deps = await obtenerDependenciasInstitucionales();
      if (!deps.length) { treeEl.innerHTML = '<p class="text-muted">No hay dependencias registradas.</p>'; return; }
      arbol = new Arbol();
      arbol.construirDesdeArray(deps, 'id', 'parent_id');
      treeEl.innerHTML = `<ul class="tree-root">${arbol.renderHTML()}</ul>`;
    } catch (e) { treeEl.innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
  }

  document.getElementById('btn-bfs').addEventListener('click', () => {
    const rec = arbol.bfs().map(d => d.nombre || d.label || d.id).join(' → ');
    const el = document.getElementById('recorrido'); el.textContent = `BFS: ${rec}`; el.hidden = false;
  });
  document.getElementById('btn-dfs').addEventListener('click', () => {
    const rec = arbol.dfs().map(d => d.nombre || d.label || d.id).join(' → ');
    const el = document.getElementById('recorrido'); el.textContent = `DFS preorden: ${rec}`; el.hidden = false;
  });

  await cargar();
</script>
</body>
</html>
