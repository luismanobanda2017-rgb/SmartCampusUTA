<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="sc-navbar"></div>
<main class="container py-4">
  <header class="page-header">
    <h1>⚙️ Panel Administrador</h1>
    <p class="text-muted">Gestión completa del sistema SmartCampus UTA.</p>
  </header>

  <!-- KPIs -->
  <div class="row g-3 mb-4" id="kpis">
    <div class="col-md-3"><div class="metric-card p-3"><p class="text-muted mb-1">Usuarios</p><div class="value" id="k-usuarios">…</div></div></div>
    <div class="col-md-3"><div class="metric-card p-3"><p class="text-muted mb-1">Trámites totales</p><div class="value" id="k-tramites">…</div></div></div>
    <div class="col-md-3"><div class="metric-card p-3"><p class="text-muted mb-1">Turnos en espera</p><div class="value" id="k-turnos">…</div></div></div>
    <div class="col-md-3"><div class="metric-card p-3"><p class="text-muted mb-1">Nodos del campus</p><div class="value" id="k-nodos">…</div></div></div>
  </div>

  <!-- Accesos rápidos -->
  <div class="row g-3 mb-4">
    <div class="col-md-3"><a class="action-card text-decoration-none d-block p-3" href="gestion_usuarios.html">
      <span class="icon d-flex align-items-center justify-content-center mb-2" style="font-size:1.5rem">👥</span>
      <h2 class="h6">Usuarios</h2></a></div>
    <div class="col-md-3"><a class="action-card text-decoration-none d-block p-3" href="gestion_tramites.html">
      <span class="icon d-flex align-items-center justify-content-center mb-2" style="font-size:1.5rem">📋</span>
      <h2 class="h6">Trámites</h2></a></div>
    <div class="col-md-3"><a class="action-card text-decoration-none d-block p-3" href="gestion_turnos.html">
      <span class="icon d-flex align-items-center justify-content-center mb-2" style="font-size:1.5rem">🎫</span>
      <h2 class="h6">Turnos (Cola)</h2></a></div>
    <div class="col-md-3"><a class="action-card text-decoration-none d-block p-3" href="gestion_rutas.html">
      <span class="icon d-flex align-items-center justify-content-center mb-2" style="font-size:1.5rem">🗺️</span>
      <h2 class="h6">Rutas (Grafo)</h2></a></div>
  </div>

  <!-- Historial de acciones recientes -->
  <section class="content-panel p-4">
    <h2 class="h5 mb-3">📜 Bitácora de acciones recientes</h2>
    <div id="bitacora">
      <div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>
    </div>
  </section>
</main>

<footer class="footer text-center mt-4">
  <div class="container"><p class="mb-0">SmartCampus UTA · 2025</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireSession } from '../../assets/js/auth.js';
  import { obtenerTodosUsuarios, obtenerTodosTramites, obtenerTurnosPorEstado, obtenerNodosCampus, obtenerHistorialAcciones } from '../../../src/Persistence/supabaseClient.js';
  import { ListaSimple } from '../../../src/Domain/DataStructures/ListaSimple.js';

  const usuario = requireSession();
  if (!usuario || usuario.rol !== 'admin') {
    alert('Acceso solo para administradores.');
    window.location.href = '../../index.html';
  }

  try {
    const [usuarios, tramites, turnosEsp, nodos, acciones] = await Promise.all([
      obtenerTodosUsuarios(), obtenerTodosTramites(),
      obtenerTurnosPorEstado('esperando'), obtenerNodosCampus(),
      obtenerHistorialAcciones(20)
    ]);

    document.getElementById('k-usuarios').textContent = usuarios.length;
    document.getElementById('k-tramites').textContent = tramites.length;
    document.getElementById('k-turnos').textContent = turnosEsp.length;
    document.getElementById('k-nodos').textContent = nodos.length;

    // Bitácora con ListaSimple
    const lista = new ListaSimple();
    acciones.forEach(a => lista.insertarAlFinal(a));
    const items = lista.toArray();
    const bitEl = document.getElementById('bitacora');
    if (!items.length) {
      bitEl.innerHTML = '<p class="text-muted">Sin acciones registradas.</p>';
    } else {
      bitEl.innerHTML = items.map(a => `
        <div class="timeline-item mb-2 p-2">
          <div class="d-flex justify-content-between">
            <strong>${a.tipo_accion || 'Acción'}</strong>
            <small class="text-muted">${new Date(a.created_at).toLocaleString('es-EC')}</small>
          </div>
          <p class="mb-0 text-muted small">${a.descripcion || ''}</p>
          ${a.usuarios ? `<p class="mb-0 text-muted small">Usuario: ${a.usuarios.nombre}</p>` : ''}
        </div>`).join('');
    }
  } catch (e) {
    document.getElementById('bitacora').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
  }
</script>
</body>
</html>
