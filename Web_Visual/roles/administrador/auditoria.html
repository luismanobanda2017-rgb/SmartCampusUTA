<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditoría - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <div id="sc-navbar"></div>

    <main class="container py-4">

      <header class="page-header mb-4">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h1 class="fw-800 mb-1">📜 Auditoría del Sistema</h1>
            <p class="text-muted mb-0">Pila de acciones recientes — historial completo de operaciones.</p>
          </div>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">← Volver</a>
        </div>
      </header>

      <!-- KPIs -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="metric-card p-3">
            <p class="text-muted mb-1 small">Total acciones</p>
            <div class="value" id="cnt-total">…</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="metric-card p-3">
            <p class="text-muted mb-1 small">Últimas 24h</p>
            <div class="value" id="cnt-hoy">…</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="metric-card p-3">
            <p class="text-muted mb-1 small">Usuarios activos</p>
            <div class="value" id="cnt-usuarios-activos">…</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="metric-card p-3">
            <p class="text-muted mb-1 small">Tipo más frecuente</p>
            <div class="value" id="tipo-frecuente" style="font-size:1rem">—</div>
          </div>
        </div>
      </div>

      <!-- Filtros -->
      <div class="content-panel mb-4">
        <div class="row g-2 align-items-center">
          <div class="col">
            <input class="form-control form-control-sm" id="buscador" type="search" placeholder="Buscar por acción, usuario o descripción...">
          </div>
          <div class="col-auto">
            <select class="form-select form-select-sm" id="filtro-tipo" style="min-width:160px">
              <option value="">Todos los tipos</option>
            </select>
          </div>
          <div class="col-auto">
            <button class="btn btn-outline-secondary btn-sm" id="btn-refrescar">↻ Refrescar</button>
          </div>
          <div class="col-auto">
            <button class="btn btn-outline-secondary btn-sm" id="btn-exportar">📥 CSV</button>
          </div>
        </div>
      </div>

      <!-- Tabla de acciones (Pila) -->
      <div class="content-panel">
        <div id="tabla-auditoria">
          <div class="spinner-block text-center">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        </div>
      </div>

    </main>

    <footer class="footer text-center mt-4">
      <div class="container"><p class="mb-0">SmartCampus UTA - 2025</p></div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>

  <script type="module">
    import { requireSession } from '../../assets/js/auth.js';
    import { obtenerHistorialAcciones } from '../../../src/Persistence/supabaseClient.js';
    import { Pila } from '../../../src/Domain/DataStructures/Pila.js';

    const usuario = requireSession();
    if (!usuario || usuario.rol !== 'admin') { window.location.href = '../../../index.html'; }

    const el = document.getElementById('tabla-auditoria');
    let todasAcciones = [];

    function render(items) {
      if (!items.length) {
        el.innerHTML = '<p class="text-muted small mb-0">Sin acciones para mostrar.</p>';
        return;
      }
      el.innerHTML = `
        <div class="text-muted small mb-2">${items.length} acción(es) — orden: más reciente primero (Pila LIFO)</div>
        <div class="table-responsive">
          <table class="table table-sm table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th class="small text-muted">#</th>
                <th class="small text-muted">Tipo de acción</th>
                <th class="small text-muted">Descripción</th>
                <th class="small text-muted">Usuario</th>
                <th class="small text-muted">Fecha</th>
              </tr>
            </thead>
            <tbody>
              ${items.map((a, i) => `
                <tr>
                  <td class="text-muted small">${i + 1}</td>
                  <td><span class="badge bg-light text-dark border small">${a.tipo_accion || '—'}</span></td>
                  <td class="small text-muted">${a.descripcion || '—'}</td>
                  <td class="small fw-semibold">${a.usuarios?.nombre || '—'}</td>
                  <td class="small text-muted">${new Date(a.created_at).toLocaleString('es-EC')}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    async function cargar() {
      el.innerHTML = '<div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>';
      try {
        const acciones = await obtenerHistorialAcciones(200);

        // Usar Pila para ordenar (LIFO — más reciente primero)
        const pila = new Pila(200);
        acciones.forEach(a => pila.apilar(a));
        todasAcciones = pila.toArray();

        // KPIs
        document.getElementById('cnt-total').textContent = todasAcciones.length;
        const hace24h = new Date(Date.now() - 86400000);
        const hoy = todasAcciones.filter(a => new Date(a.created_at) > hace24h);
        document.getElementById('cnt-hoy').textContent = hoy.length;

        const usuariosUnicos = new Set(todasAcciones.map(a => a.usuarios?.nombre).filter(Boolean));
        document.getElementById('cnt-usuarios-activos').textContent = usuariosUnicos.size;

        const freqTipo = {};
        todasAcciones.forEach(a => { if (a.tipo_accion) freqTipo[a.tipo_accion] = (freqTipo[a.tipo_accion] || 0) + 1; });
        const tipoTop = Object.entries(freqTipo).sort((a, b) => b[1] - a[1])[0];
        document.getElementById('tipo-frecuente').textContent = tipoTop ? tipoTop[0] : '—';

        // Llenar filtro de tipos
        const filtroTipo = document.getElementById('filtro-tipo');
        const tiposExistentes = [...new Set(todasAcciones.map(a => a.tipo_accion).filter(Boolean))];
        tiposExistentes.forEach(t => {
          const o = document.createElement('option');
          o.value = t; o.textContent = t;
          filtroTipo.appendChild(o);
        });

        render(todasAcciones);
      } catch (e) {
        el.innerHTML = `<div class="alert alert-danger small">${e.message}</div>`;
      }
    }

    function aplicarFiltros() {
      const q    = document.getElementById('buscador').value.toLowerCase();
      const tipo = document.getElementById('filtro-tipo').value;
      const filtradas = todasAcciones.filter(a =>
        (!tipo || a.tipo_accion === tipo) &&
        (!q || (a.tipo_accion || '').toLowerCase().includes(q) ||
               (a.descripcion || '').toLowerCase().includes(q) ||
               (a.usuarios?.nombre || '').toLowerCase().includes(q)));
      render(filtradas);
    }

    document.getElementById('buscador').addEventListener('input', aplicarFiltros);
    document.getElementById('filtro-tipo').addEventListener('change', aplicarFiltros);
    document.getElementById('btn-refrescar').addEventListener('click', cargar);

    document.getElementById('btn-exportar').addEventListener('click', () => {
      const csv = [
        'Tipo,Descripcion,Usuario,Fecha',
        ...todasAcciones.map(a =>
          `"${a.tipo_accion || ''}","${(a.descripcion || '').replace(/"/g, "'")}","${a.usuarios?.nombre || ''}","${a.created_at}"`)
      ].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const lnk  = document.createElement('a');
      lnk.href = url; lnk.download = 'auditoria_smartcampus.csv'; lnk.click();
      URL.revokeObjectURL(url);
    });

    document.addEventListener('DOMContentLoaded', cargar);
  </script>
</body>
</html>
