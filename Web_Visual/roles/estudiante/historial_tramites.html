<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Trámites - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="sc-navbar"></div>
<main class="container py-4">
  <header class="page-header">
    <h1>📋 Historial de Trámites</h1>
    <p class="text-muted">Navega entre expedientes con la <strong>Lista Doblemente Enlazada</strong>.</p>
  </header>

  <div class="d-flex gap-2 mb-3">
    <button class="btn btn-outline-secondary" id="btn-anterior">← Anterior</button>
    <button class="btn btn-outline-secondary" id="btn-siguiente">Siguiente →</button>
    <span class="my-auto text-muted small">Navegación bidireccional por expedientes</span>
  </div>

  <div id="detalle-exp" class="mock-note mb-3" hidden>
    <strong>Expediente actual:</strong> <span id="exp-info"></span>
  </div>

  <section class="content-panel p-4">
    <div id="tabla-historial">
      <div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>
    </div>
  </section>
</main>

<footer class="footer text-center mt-4">
  <div class="container"><p class="mb-0">SmartCampus UTA · 2025</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireSession } from '../../assets/js/auth.js';
  import { obtenerTramitesUsuario } from '../../../src/Persistence/supabaseClient.js';
  import { ListaDoble } from '../../../src/Domain/DataStructures/ListaDoble.js';

  const usuario = requireSession();
  if (!usuario) throw new Error('Sin sesión');

  const listaDoble = new ListaDoble();
  const el = document.getElementById('tabla-historial');

  const estadoBadge = (e) => {
    const cl = { pendiente:'warning', en_proceso:'primary', completado:'success', rechazado:'danger' };
    return `<span class="badge bg-${cl[e]||'secondary'}">${e}</span>`;
  };

  try {
    const tramites = await obtenerTramitesUsuario(usuario.id);
    tramites.forEach(t => listaDoble.insertar(t));

    if (!tramites.length) {
      el.innerHTML = '<p class="text-muted">No tienes trámites. <a href="solicitar_tramite.html">Solicitar uno</a>.</p>';
    } else {
      el.innerHTML = `<div class="table-responsive"><table class="table table-sm">
        <thead><tr><th>Tipo</th><th>Descripción</th><th>Estado</th><th>Fecha</th></tr></thead>
        <tbody>${tramites.map(t=>`<tr>
          <td><strong>${t.tipo}</strong></td>
          <td>${t.descripcion||'-'}</td>
          <td>${estadoBadge(t.estado)}</td>
          <td>${new Date(t.created_at).toLocaleString('es-EC')}</td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    }
  } catch (e) {
    el.innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
  }

  document.getElementById('btn-siguiente').addEventListener('click', () => {
    const dato = listaDoble.siguiente();
    if (dato) {
      document.getElementById('exp-info').textContent = `${dato.tipo} — ${dato.descripcion||'Sin desc.'} (${dato.estado})`;
      document.getElementById('detalle-exp').hidden = false;
    }
  });
  document.getElementById('btn-anterior').addEventListener('click', () => {
    const dato = listaDoble.anterior();
    if (dato) {
      document.getElementById('exp-info').textContent = `${dato.tipo} — ${dato.descripcion||'Sin desc.'} (${dato.estado})`;
      document.getElementById('detalle-exp').hidden = false;
    }
  });
</script>
</body>
</html>
