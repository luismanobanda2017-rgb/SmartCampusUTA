<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitar Trámite - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="sc-navbar"></div>
<main class="container py-4">
  <header class="page-header">
    <h1>📋 Solicitar Trámite</h1>
    <p class="text-muted">Los trámites se almacenan en una <strong>Lista Simplemente Enlazada</strong> para historial dinámico.</p>
  </header>

  <div class="row g-4">
    <div class="col-md-5">
      <section class="content-panel p-4">
        <h2 class="h5 mb-3">Nuevo trámite</h2>
        <div id="form-msg" hidden class="alert"></div>
        <form id="form-tramite">
          <div class="mb-3">
            <label class="form-label">Tipo de trámite</label>
            <select class="form-select" id="tipo" required>
              <option value="">Selecciona...</option>
              <option value="matricula">Matrícula</option>
              <option value="beca">Beca</option>
              <option value="certificado">Certificado</option>
              <option value="retiro">Retiro de materia</option>
              <option value="otro">Otro</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" id="descripcion" rows="3" placeholder="Describe tu solicitud..."></textarea>
          </div>
          <button class="btn btn-primary w-100" type="submit">Enviar trámite</button>
        </form>
      </section>
    </div>

    <div class="col-md-7">
      <section class="content-panel p-4">
        <h2 class="h5 mb-3">Mis trámites <small class="text-muted fs-6">(Lista enlazada)</small></h2>
        <div id="lista-tramites">
          <div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
      </section>
    </div>
  </div>
</main>

<footer class="footer text-center mt-4">
  <div class="container"><p class="mb-0">SmartCampus UTA · 2025</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireSession } from '../../assets/js/auth.js';
  import { crearTramite, obtenerTramitesUsuario, cancelarTramite } from '../../../src/Persistence/supabaseClient.js';
  import { ListaSimple } from '../../../src/Domain/DataStructures/ListaSimple.js';

  const usuario = requireSession();
  if (!usuario) throw new Error('Sin sesión');

  const listaTramites = new ListaSimple();
  const el = document.getElementById('lista-tramites');
  const msg = document.getElementById('form-msg');

  function estadoBadge(e) {
    const cl = { pendiente:'warning', en_proceso:'primary', completado:'success', rechazado:'danger' };
    return `<span class="badge bg-${cl[e]||'secondary'}">${e}</span>`;
  }

  function renderLista() {
    const items = listaTramites.toArray();
    if (items.length === 0) {
      el.innerHTML = '<p class="text-muted">No tienes trámites registrados.</p>';
      return;
    }
    el.innerHTML = items.map(t => `
      <div class="queue-item mb-2">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <strong>${t.tipo}</strong> ${estadoBadge(t.estado)}
            <p class="mb-0 text-muted small">${t.descripcion || 'Sin descripción'}</p>
            <p class="mb-0 text-muted small">${new Date(t.created_at).toLocaleString('es-EC')}</p>
          </div>
          ${t.estado === 'pendiente' ? `<button class="btn btn-outline-danger btn-sm" data-cancel="${t.id}">Cancelar</button>` : ''}
        </div>
      </div>`).join('');
  }

  async function cargarTramites() {
    try {
      const data = await obtenerTramitesUsuario(usuario.id);
      listaTramites.cabeza = null; listaTramites.tamano = 0;
      data.forEach(t => listaTramites.insertarAlFinal(t));
      renderLista();
    } catch (e) {
      el.innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
    }
  }

  document.getElementById('form-tramite').addEventListener('submit', async (e) => {
    e.preventDefault();
    const tipo = document.getElementById('tipo').value;
    const desc = document.getElementById('descripcion').value;
    const btn = e.target.querySelector('button');
    btn.disabled = true; btn.textContent = 'Enviando...';
    msg.hidden = true;
    try {
      const nuevo = await crearTramite(usuario.id, tipo, desc);
      listaTramites.insertarAlInicio(nuevo);
      renderLista();
      msg.className = 'alert alert-success'; msg.textContent = 'Trámite enviado correctamente.'; msg.hidden = false;
      e.target.reset();
    } catch (err) {
      msg.className = 'alert alert-danger'; msg.textContent = err.message; msg.hidden = false;
    } finally {
      btn.disabled = false; btn.textContent = 'Enviar trámite';
    }
  });

  el.addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-cancel]');
    if (!btn) return;
    if (!confirm('¿Cancelar este trámite?')) return;
    try {
      await cancelarTramite(btn.dataset.cancel, usuario.id);
      await cargarTramites();
    } catch (err) {
      alert(err.message);
    }
  });

  await cargarTramites();
</script>
</body>
</html>
