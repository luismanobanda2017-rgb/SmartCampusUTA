<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="sc-navbar"></div>
<main class="container py-4" style="max-width:600px">
  <header class="page-header">
    <h1>👤 Mi Perfil</h1>
  </header>

  <section class="content-panel p-4">
    <div class="mb-3"><label class="form-label fw-bold">Nombre</label><p id="p-nombre" class="mb-0">—</p></div>
    <div class="mb-3"><label class="form-label fw-bold">Correo</label><p id="p-email" class="mb-0">—</p></div>
    <div class="mb-3"><label class="form-label fw-bold">Rol</label><p id="p-rol" class="mb-0">—</p></div>
    <div class="mb-3"><label class="form-label fw-bold">Registrado</label><p id="p-fecha" class="mb-0">—</p></div>
    <a href="dashboard.html" class="btn btn-outline-primary">← Volver al panel</a>
  </section>
</main>

<footer class="footer text-center mt-4">
  <div class="container"><p class="mb-0">SmartCampus UTA · 2025</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireSession } from '../../assets/js/auth.js';
  const usuario = requireSession();
  if (usuario) {
    document.getElementById('p-nombre').textContent = usuario.nombre;
    document.getElementById('p-email').textContent = usuario.email;
    document.getElementById('p-rol').textContent = usuario.rol;
    document.getElementById('p-fecha').textContent = usuario.created_at
      ? new Date(usuario.created_at).toLocaleDateString('es-EC') : 'N/A';
  }
</script>
</body>
</html>
