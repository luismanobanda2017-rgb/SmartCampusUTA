<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa del Campus - Estudiante</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map { height: 520px; border-radius: 8px; border: 1px solid var(--line); z-index: 0; }
    .leaflet-legend {
      background: white; padding: 10px 14px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.18); font-size: .82rem; line-height: 2;
    }
    .legend-dot {
      display: inline-block; width: 13px; height: 13px;
      border-radius: 50%; margin-right: 6px; vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="sc-navbar"></div>

    <main class="container py-4">

      <header class="page-header mb-4">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h1 class="fw-800 mb-1">🗺️ Mapa del Campus</h1>
            <p class="text-muted mb-0">Campus Huachi — Universidad Técnica de Ambato</p>
          </div>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">← Volver</a>
        </div>
      </header>

      <!-- Calculadora Dijkstra -->
      <div class="content-panel mb-4">
        <h2 class="h5 mb-3">🧭 Calcular ruta óptima (Dijkstra)</h2>
        <div class="row g-2 align-items-end">
          <div class="col-md-4">
            <label class="form-label fw-semibold small">Origen</label>
            <select id="dij-origen" class="form-select form-select-sm">
              <option value="">Selecciona origen...</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold small">Destino</label>
            <select id="dij-destino" class="form-select form-select-sm">
              <option value="">Selecciona destino...</option>
            </select>
          </div>
          <div class="col-md-4">
            <button id="btn-dijkstra" class="btn btn-warning w-100 btn-sm">Calcular ruta</button>
          </div>
        </div>
        <div id="dij-resultado" class="mock-note mt-3" hidden></div>
      </div>

      <!-- Mapa Leaflet -->
      <div class="content-panel p-3 mb-4">
        <div id="map"></div>
      </div>

      <!-- Puntos del campus -->
      <div class="content-panel">
        <h2 class="h5 mb-3">📍 Puntos del campus</h2>
        <div id="nodos-lista" class="row g-2"></div>
      </div>

    </main>

    <footer class="footer text-center mt-4">
      <div class="container"><p class="mb-0">SmartCampus UTA - 2025</p></div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>

  <script type="module">
    import { requireSession } from '../../assets/js/auth.js';

    const usuario = requireSession();
    if (!usuario || usuario.rol !== 'estudiante') { window.location.href = '../../../index.html'; }

    /* ════════════════════════════════════════════════════════
       NODOS HARDCODEADOS — Campus Huachi UTA
       Estructura: { id, nombre, cat, lat, lng }
    ════════════════════════════════════════════════════════ */
    const NODOS = [
      { id:'n01', nombre:'Universidad Técnica de Ambato',             cat:'admin',    lat:-1.2693988,  lng:-78.6255708 },
      { id:'n02', nombre:'Rectorado',                                 cat:'admin',    lat:-1.2676377,  lng:-78.6241788 },
      { id:'n03', nombre:'Secretaría',                                cat:'admin',    lat:-1.2676377,  lng:-78.6241788 },
      { id:'n04', nombre:'Bienestar Universitario',                   cat:'admin',    lat:-1.2694591,  lng:-78.6241797 },
      { id:'n06', nombre:'Biblioteca General',                        cat:'admin',    lat:-1.2669225,  lng:-78.6247209 },
      { id:'n07', nombre:'Facultad de Ingeniería en Sistemas Electrónica e Industrial', cat:'facultad', lat:-1.2676377,  lng:-78.6241788 },
      { id:'n08', nombre:'Facultad de Ciencias Administrativas',      cat:'facultad', lat:-1.2680554,  lng:-78.6253033 },
      { id:'n09', nombre:'Facultad de Contabilidad y Auditoría',      cat:'facultad', lat:-1.2686643,  lng:-78.6247605 },
      { id:'n10', nombre:'Facultad de Ciencias Humanas y de la Educación', cat:'facultad', lat:-1.2666236, lng:-78.6248803 },
      { id:'n11', nombre:'Facultad de Diseño, Arquitectura y Artes',  cat:'facultad', lat:-1.2669225,  lng:-78.6247209 },
      { id:'n12', nombre:'Facultad de Ingeniería Civil y Mecánica',   cat:'facultad', lat:-1.2687379,  lng:-78.6241934 },
      { id:'n13', nombre:'Facultad de Ciencia e Ingeniería en Alimentos', cat:'facultad', lat:-1.2694924, lng:-78.6242755 },
      { id:'n14', nombre:'Facultad de Jurisprudencia y Ciencias Sociales', cat:'facultad', lat:-1.2680609, lng:-78.6244933 },
      { id:'n15', nombre:'Centro de Idiomas',                         cat:'facultad', lat:-1.2678076,  lng:-78.6239649 },
      { id:'n16', nombre:'Edificio de Ciencias Básicas',              cat:'facultad', lat:-1.2675787,  lng:-78.6239318 },
      { id:'n17', nombre:'Carrera de Mercadotecnia',                  cat:'facultad', lat:-1.2677002,  lng:-78.6252309 },
      { id:'n19', nombre:'Coliseo Universitario',                     cat:'deporte',  lat:-1.2694591,  lng:-78.6241797 },
      { id:'n20', nombre:'Estadio Universitario',                     cat:'deporte',  lat:-1.2704822,  lng:-78.6226741 },
      { id:'n21', nombre:'Complejo Acuático',                         cat:'deporte',  lat:-1.2701603,  lng:-78.6239970 },
      { id:'n27', nombre:'Estadio de la Universidad Técnica de Ambato', cat:'deporte', lat:-1.2693819,  lng:-78.6255475 },
      { id:'n22', nombre:'Patio de Comidas',                          cat:'servicio', lat:-1.2683338,  lng:-78.6235557 },
      { id:'n26', nombre:'Ambulancia',                                cat:'servicio', lat:-1.2683338,  lng:-78.6235557 },
      { id:'n23', nombre:'Parqueadero Norte',                         cat:'servicio', lat:-1.2676377,  lng:-78.6241788 },
      { id:'n24', nombre:'Parqueadero Sur',                           cat:'servicio', lat:-1.2687379,  lng:-78.6241934 },
      { id:'n25', nombre:'Entrada Principal',                         cat:'servicio', lat:-1.2669124,  lng:-78.6245667 },
    ];

    /* Conexiones del grafo (para Dijkstra) */
    // GRAFO COMPLETO — Campus Huachi UTA
    // Pesos en metros. Todas las aristas son bidireccionales.
    const CONEXIONES = [
      // Entrada → zona central
      ['n25','n06',  80],  // Entrada Principal → Biblioteca General
      ['n25','n10', 100],  // Entrada Principal → FCHE
      // Biblioteca General (hub central) → todas las facultades
      ['n06','n02',  90],  // Biblioteca → Rectorado/FISEI
      ['n06','n08', 110],  // Biblioteca → FCA
      ['n06','n14',  95],  // Biblioteca → FJCS
      ['n06','n22',  60],  // Biblioteca → Patio de Comidas
      ['n06','n04', 110],  // Biblioteca → Bienestar Universitario
      ['n06','n17',  75],  // Biblioteca → Mercadotecnia
      ['n06','n01',  55],  // Biblioteca → UTA (edificio central)
      // Zona FISEI (n02/n03/n07 comparten coord)
      ['n02','n07',   5],  // Rectorado ↔ FISEI
      ['n02','n03',   5],  // Rectorado ↔ Secretaría
      ['n02','n15',  60],  // Rectorado → Centro de Idiomas
      ['n02','n16',  55],  // Rectorado → Ciencias Básicas
      ['n15','n16',  30],  // Centro de Idiomas ↔ Ciencias Básicas
      // Cadena norte de facultades
      ['n08','n09',  70],  // FCA → FCAUD
      ['n09','n10',  80],  // FCAUD → FCHE
      ['n10','n11',  90],  // FCHE → FDAA
      // Cadena sur de facultades
      ['n07','n12', 130],  // FISEI → FICM
      ['n12','n13', 140],  // FICM → FCIAB
      ['n12','n24', 100],  // FICM → Parqueadero Sur
      // FJCS → zona norte
      ['n14','n08',  85],  // FJCS → FCA
      // Bienestar Universitario → coliseo
      ['n04','n19', 120],  // Bienestar → Coliseo
      // Deportes
      ['n19','n22', 100],  // Coliseo ↔ Patio de Comidas
      ['n19','n04',  80],  // Coliseo ↔ Bienestar
      ['n20','n21',  90],  // Estadio → Complejo Acuático
      ['n21','n19', 150],  // Complejo Acuático → Coliseo
      // Parqueadero Norte
      ['n23','n02', 120],  // Parqueadero Norte → Rectorado/FISEI
      ['n23','n15',  60],  // Parqueadero Norte → Centro de Idiomas
      // Ambulancia (mismo punto que Patio de Comidas)
      ['n22','n26',   5],
      // Estadio UTA (mismo punto que UTA central)
      ['n01','n27',   5],
      // UTA central
      ['n01','n02', 200],  // UTA → Rectorado
      ['n01','n04',  80],  // UTA → Bienestar
    ];

    /* ── Estilos por categoría ── */
    const CAT = {
      admin:    { bg: '#1a3a5c', emoji: '🏛️', label: 'Administración' },
      facultad: { bg: '#c0392b', emoji: '🎓', label: 'Facultad'       },
      deporte:  { bg: '#1e8449', emoji: '⚽', label: 'Deportes'       },
      servicio: { bg: '#d35400', emoji: '🍽️', label: 'Servicio'       },
    };
    const EMOJI_ESP = { 'n23':'🅿️', 'n24':'🅿️', 'n25':'🚪', 'n26':'🚑', 'n27':'⚽' };

    const getEmoji = n => EMOJI_ESP[n.id] || CAT[n.cat].emoji;

    /* ── Mapa ── */
    const map = L.map('map', { center: [-1.2685, -78.6245], zoom: 17, minZoom: 15, maxZoom: 19 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19,
    }).addTo(map);

    /* Leyenda */
    const leg = L.control({ position: 'bottomright' });
    leg.onAdd = () => {
      const d = L.DomUtil.create('div', 'leaflet-legend');
      d.innerHTML = `<strong style="font-size:.85rem">Leyenda</strong><br>
        <span class="legend-dot" style="background:#1a3a5c"></span>Administración<br>
        <span class="legend-dot" style="background:#c0392b"></span>Facultades<br>
        <span class="legend-dot" style="background:#1e8449"></span>Deportes<br>
        <span class="legend-dot" style="background:#d35400"></span>Servicios`;
      return d;
    };
    leg.addTo(map);

    /* ── Grafo simple para Dijkstra ── */
    const adj = new Map();
    NODOS.forEach(n => adj.set(n.id, []));
    CONEXIONES.forEach(([a, b, d]) => {
      adj.get(a)?.push({ dest: b, dist: d });
      adj.get(b)?.push({ dest: a, dist: d }); // bidireccional
    });

    // Verificar nodos aislados (sin conexiones)
    NODOS.forEach(n => {
      if ((adj.get(n.id) || []).length === 0) {
        console.warn(`[MAPA] Nodo aislado sin conexiones: ${n.id} (${n.nombre})`);
      }
    });

    function dijkstra(origen, destino) {
      const dist  = new Map(NODOS.map(n => [n.id, Infinity]));
      const prev  = new Map();
      const vistos = new Set();
      dist.set(origen, 0);

      while (true) {
        // Nodo no visitado con menor distancia acumulada
        let u = null;
        for (const [id, d] of dist) {
          if (!vistos.has(id) && (u === null || d < dist.get(u))) u = id;
        }
        if (u === null || dist.get(u) === Infinity) break; // sin más alcanzables
        if (u === destino) break; // destino alcanzado
        vistos.add(u);

        for (const { dest, dist: w } of (adj.get(u) || [])) {
          const alt = dist.get(u) + w;
          if (alt < dist.get(dest)) {
            dist.set(dest, alt);
            prev.set(dest, u);
          }
        }
      }

      // Reconstruir ruta hacia atrás desde destino
      const ruta = [];
      let cur = destino;
      while (cur !== undefined) {
        ruta.unshift(cur);
        cur = prev.get(cur);
      }

      const rutaValida = ruta.length >= 2 && ruta[0] === origen;
      return {
        distancia: rutaValida ? dist.get(destino) : Infinity,
        ruta:      rutaValida ? ruta : [],
      };
    }

    // Obtiene el peso de la arista entre dos nodos
    function pesoArista(a, b) {
      const vecinos = adj.get(a) || [];
      return vecinos.find(v => v.dest === b)?.dist ?? null;
    }

    /* ── Marcadores ── */
    const markerMap = new Map(); // id → {nodo, marker}

    NODOS.forEach(n => {
      const emoji = getEmoji(n);
      const bg    = CAT[n.cat].bg;
      const icon  = L.divIcon({
        html: `<div style="background:${bg};color:#fff;border-radius:50%;width:36px;height:36px;
               display:flex;align-items:center;justify-content:center;font-size:17px;
               border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.4)">${emoji}</div>`,
        className: '', iconSize: [36, 36], iconAnchor: [18, 18],
      });
      const marker = L.marker([n.lat, n.lng], { icon })
        .addTo(map)
        .bindPopup(`<strong style="font-size:.9rem">${n.nombre}</strong><br>
                    <small style="color:${bg};font-weight:600">${CAT[n.cat].label}</small>`);
      markerMap.set(n.id, { nodo: n, marker });
    });

    /* ── Líneas de conexión ── */
    CONEXIONES.forEach(([a, b]) => {
      const na = markerMap.get(a)?.nodo;
      const nb = markerMap.get(b)?.nodo;
      if (!na || !nb) return;
      L.polyline([[na.lat, na.lng], [nb.lat, nb.lng]],
        { color: '#4a90d9', weight: 2.5, opacity: 0.6 }).addTo(map);
    });

    /* ── Selectores ── */
    let rutaLayer    = null;
    let tramoLayers  = [];   // polylines de tramos individuales
    let labelLayers  = [];   // marcadores de etiquetas de distancia

    const selO = document.getElementById('dij-origen');
    const selD = document.getElementById('dij-destino');
    selO.innerHTML = '<option value="">Selecciona origen...</option>';
    selD.innerHTML = '<option value="">Selecciona destino...</option>';
    NODOS.forEach(n => {
      selO.innerHTML += `<option value="${n.id}">${n.nombre}</option>`;
      selD.innerHTML += `<option value="${n.id}">${n.nombre}</option>`;
    });

    function limpiarRuta() {
      if (rutaLayer)    { map.removeLayer(rutaLayer); rutaLayer = null; }
      tramoLayers.forEach(l => map.removeLayer(l)); tramoLayers = [];
      labelLayers.forEach(l => map.removeLayer(l)); labelLayers = [];
    }

    /* ── Tarjetas de nodos ── */
    document.getElementById('nodos-lista').innerHTML = NODOS.map(n => `
      <div class="col-6 col-md-4 col-lg-3">
        <div class="d-flex align-items-center gap-2 p-2 border rounded bg-white"
             style="cursor:pointer" onclick="window._flyTo('${n.id}')">
          <span style="font-size:1.3rem;min-width:30px;text-align:center;
                background:${CAT[n.cat].bg};border-radius:50%;width:34px;height:34px;
                display:flex;align-items:center;justify-content:center">
            ${getEmoji(n)}
          </span>
          <div>
            <div class="small fw-semibold lh-sm">${n.nombre}</div>
            <div class="small" style="color:${CAT[n.cat].bg};font-size:.72rem">${CAT[n.cat].label}</div>
          </div>
        </div>
      </div>`).join('');

    window._flyTo = id => {
      const e = markerMap.get(id);
      if (!e) return;
      map.flyTo([e.nodo.lat, e.nodo.lng], 19, { duration: 1 });
      e.marker.openPopup();
    };

    /* ── Dijkstra ── */
    document.getElementById('btn-dijkstra').addEventListener('click', () => {
      const oId = document.getElementById('dij-origen').value;
      const dId = document.getElementById('dij-destino').value;
      const elR = document.getElementById('dij-resultado');
      if (!oId || !dId) { alert('Selecciona origen y destino.'); return; }
      if (oId === dId)  { alert('Selecciona puntos diferentes.'); return; }

      const { distancia, ruta } = dijkstra(oId, dId);
      limpiarRuta();
      elR.hidden = false;

      if (!ruta.length || distancia === Infinity) {
        elR.innerHTML = '<span class="text-danger">⚠ No hay ruta disponible entre estos puntos.</span>';
        return;
      }

      // Construir descripción de tramos
      const tramos = [];
      for (let i = 0; i < ruta.length - 1; i++) {
        const peso = pesoArista(ruta[i], ruta[i + 1]);
        tramos.push(`<span class="badge bg-light text-dark border">${peso ?? '?'} m</span>`);
      }

      const nombres = ruta.map(id => markerMap.get(id)?.nodo?.nombre || id).join(' → ');
      elR.innerHTML = `
        <strong>Ruta:</strong> ${nombres}<br>
        <small>Distancia total: <strong>${distancia.toFixed(0)} m</strong></small><br>
        <div class="mt-1 d-flex flex-wrap gap-1 align-items-center">
          <small class="text-muted">Tramos:</small> ${tramos.join(' <span class="text-muted">→</span> ')}
        </div>`;

      // Dibujar tramos individuales con etiqueta de distancia
      const allCoords = [];
      for (let i = 0; i < ruta.length - 1; i++) {
        const na = markerMap.get(ruta[i])?.nodo;
        const nb = markerMap.get(ruta[i + 1])?.nodo;
        if (!na || !nb) continue;

        const peso = pesoArista(ruta[i], ruta[i + 1]);
        allCoords.push([na.lat, na.lng]);

        // Línea del tramo
        const tramo = L.polyline([[na.lat, na.lng], [nb.lat, nb.lng]], {
          color: '#e87a2a', weight: 6, opacity: 0.9,
        }).addTo(map);
        tramoLayers.push(tramo);

        // Etiqueta de distancia en el punto medio del tramo
        if (peso !== null) {
          const midLat = (na.lat + nb.lat) / 2;
          const midLng = (na.lng + nb.lng) / 2;
          const label = L.marker([midLat, midLng], {
            icon: L.divIcon({
              html: `<div style="background:white;border:1.5px solid #e87a2a;border-radius:4px;
                     padding:1px 5px;font-size:11px;font-weight:700;color:#e87a2a;
                     white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.2)">${peso} m</div>`,
              className: '', iconAnchor: [20, 10],
            }),
          }).addTo(map);
          labelLayers.push(label);
        }
      }

      // Añadir último punto
      const lastNodo = markerMap.get(ruta[ruta.length - 1])?.nodo;
      if (lastNodo) allCoords.push([lastNodo.lat, lastNodo.lng]);

      if (allCoords.length > 1) {
        map.fitBounds(L.latLngBounds(allCoords), { padding: [50, 50] });
      }

      // Popups en origen y destino
      markerMap.get(oId)?.marker?.openPopup();
    });
  </script>
</body>
</html>
