<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Campus - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    #campus-canvas { width:100%; height:420px; border:1px solid var(--line); border-radius:8px; background:#f8fbff; }
  </style>
</head>
<body>
<div id="sc-navbar"></div>
<main class="container py-4">
  <header class="page-header">
    <h1>🗺️ Mapa del Campus</h1>
    <p class="text-muted">Representación con <strong>Grafo</strong> y búsqueda de ruta óptima con <strong>Dijkstra</strong>.</p>
  </header>

  <div class="row g-4">
    <div class="col-md-4">
      <section class="content-panel p-4">
        <h2 class="h5 mb-3">Buscar ruta</h2>
        <div class="mb-3">
          <label class="form-label">Desde</label>
          <select class="form-select" id="origen"></select>
        </div>
        <div class="mb-3">
          <label class="form-label">Hasta</label>
          <select class="form-select" id="destino"></select>
        </div>
        <button class="btn btn-primary w-100" id="btn-ruta">Calcular ruta (Dijkstra)</button>

        <div id="ruta-resultado" class="mt-3" hidden>
          <div class="mock-note">
            <strong>Ruta óptima:</strong><br>
            <span id="ruta-nodos"></span><br>
            <small>Distancia total: <strong id="ruta-dist"></strong> m</small>
          </div>
        </div>

        <div id="nodos-lista" class="mt-3">
          <h3 class="h6">Puntos del campus:</h3>
          <div id="nodos-items">
            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
          </div>
        </div>
      </section>
    </div>

    <div class="col-md-8">
      <canvas id="campus-canvas"></canvas>
      <p class="text-muted small mt-2">Los nodos azules son puntos del campus. La ruta calculada se resalta en naranja.</p>
    </div>
  </div>
</main>

<footer class="footer text-center mt-4">
  <div class="container"><p class="mb-0">SmartCampus UTA · 2025</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireSession } from '../../assets/js/auth.js';
  import { obtenerNodosCampus, obtenerRutasCampus } from '../../../src/Persistence/supabaseClient.js';
  import { Grafo } from '../../../src/Domain/DataStructures/Grafo.js';

  requireSession();

  const grafo = new Grafo();
  let nodosRaw = [], rutaResaltada = [];

  const canvas = document.getElementById('campus-canvas');
  const ctx = canvas.getContext('2d');

  function escalarNodos(nodos) {
    if (!nodos.length) return nodos;
    const minX = Math.min(...nodos.map(n => n.pos_x));
    const maxX = Math.max(...nodos.map(n => n.pos_x));
    const minY = Math.min(...nodos.map(n => n.pos_y));
    const maxY = Math.max(...nodos.map(n => n.pos_y));
    const pad = 60;
    const W = canvas.width - pad * 2;
    const H = canvas.height - pad * 2;
    return nodos.map(n => ({
      ...n,
      cx: pad + ((n.pos_x - minX) / (maxX - minX || 1)) * W,
      cy: pad + ((n.pos_y - minY) / (maxY - minY || 1)) * H
    }));
  }

  function dibujar(rutaIds = []) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const nodos = escalarNodos(nodosRaw);
    const mapa = new Map(nodos.map(n => [n.id, n]));
    const aristas = grafo.obtenerAristas();

    ctx.clearRect(0, 0, rect.width, rect.height);

    // Aristas normales
    ctx.strokeStyle = '#d9e2ec'; ctx.lineWidth = 2;
    const dibujadas = new Set();
    for (const { origen, destino } of aristas) {
      const key = [origen, destino].sort().join('-');
      if (dibujadas.has(key)) continue; dibujadas.add(key);
      const a = mapa.get(origen), b = mapa.get(destino);
      if (!a || !b) continue;
      ctx.beginPath(); ctx.moveTo(a.cx, a.cy); ctx.lineTo(b.cx, b.cy); ctx.stroke();
    }

    // Ruta resaltada
    if (rutaIds.length > 1) {
      ctx.strokeStyle = '#e87a2a'; ctx.lineWidth = 5;
      ctx.beginPath();
      rutaIds.forEach((id, i) => {
        const n = mapa.get(id); if (!n) return;
        i === 0 ? ctx.moveTo(n.cx, n.cy) : ctx.lineTo(n.cx, n.cy);
      });
      ctx.stroke();
    }

    // Nodos
    nodos.forEach(n => {
      const enRuta = rutaIds.includes(n.id);
      ctx.fillStyle = enRuta ? '#e87a2a' : '#0b3b5f';
      ctx.beginPath(); ctx.arc(n.cx, n.cy, 14, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#17212b'; ctx.font = '600 12px Inter';
      ctx.fillText(n.nombre, n.cx + 18, n.cy + 4);
    });
  }

  async function init() {
    try {
      const [nodos, rutas] = await Promise.all([obtenerNodosCampus(), obtenerRutasCampus()]);
      nodosRaw = nodos;
      grafo.construirDesdeSupabase(nodos, rutas);

      // Selects
      const origen = document.getElementById('origen');
      const destino = document.getElementById('destino');
      nodos.forEach(n => {
        [origen, destino].forEach(sel => {
          const opt = document.createElement('option');
          opt.value = n.id; opt.textContent = n.nombre; sel.appendChild(opt);
        });
      });
      if (nodos.length > 1) destino.selectedIndex = 1;

      // Lista textual
      document.getElementById('nodos-items').innerHTML = nodos.map(n =>
        `<span class="badge bg-secondary me-1 mb-1">${n.nombre}</span>`).join('');

      dibujar();
    } catch (e) {
      document.getElementById('nodos-items').textContent = 'Error: ' + e.message;
    }
  }

  document.getElementById('btn-ruta').addEventListener('click', () => {
    const o = document.getElementById('origen').value;
    const d = document.getElementById('destino').value;
    if (o === d) { alert('Selecciona puntos diferentes.'); return; }
    const { distancia, ruta } = grafo.dijkstra(o, d);
    rutaResaltada = ruta;
    const resEl = document.getElementById('ruta-resultado');
    if (!ruta.length || distancia === Infinity) {
      resEl.innerHTML = '<div class="alert alert-warning">No hay ruta disponible.</div>';
      resEl.hidden = false;
    } else {
      const nombres = ruta.map(id => grafo.nodos.get(id)?.nombre || id).join(' → ');
      document.getElementById('ruta-nodos').textContent = nombres;
      document.getElementById('ruta-dist').textContent = distancia.toFixed(0);
      resEl.hidden = false;
    }
    dibujar(ruta);
  });

  window.addEventListener('resize', () => dibujar(rutaResaltada));
  await init();
</script>
</body>
</html>
