<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Turnos - SmartCampus UTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="sc-navbar"></div>
<main class="container py-4">
  <header class="page-header">
    <h1>🎫 Turnos de Atención</h1>
    <p class="text-muted">Sistema de cola <strong>FIFO</strong> — el primero en llegar es el primero en ser atendido.</p>
  </header>

  <div class="row g-4">
    <div class="col-md-5">
      <section class="content-panel p-4">
        <h2 class="h5 mb-3">Solicitar turno</h2>
        <div id="turno-msg" hidden class="alert"></div>
        <form id="form-turno">
          <div class="mb-3">
            <label class="form-label">Servicio</label>
            <select class="form-select" id="servicio" required>
              <option value="">Selecciona...</option>
              <option value="secretaria">Secretaría</option>
              <option value="bienestar">Bienestar Estudiantil</option>
              <option value="biblioteca">Biblioteca</option>
              <option value="financiero">Financiero</option>
            </select>
          </div>
          <button class="btn btn-primary w-100" type="submit">Tomar turno</button>
        </form>

        <div id="turno-actual" class="mt-3" hidden>
          <div class="alert alert-success">
            <strong>🎫 Turno tomado</strong><br>
            Número: <strong id="num-turno"></strong><br>
            Servicio: <strong id="srv-turno"></strong><br>
            <small>Estado: Esperando atención</small>
          </div>
        </div>
      </section>

      <!-- Cola en espera -->
      <section class="content-panel p-4 mt-3">
        <h2 class="h5 mb-2">Cola actual en espera</h2>
        <div id="cola-espera">
          <div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
      </section>
    </div>

    <div class="col-md-7">
      <section class="content-panel p-4">
        <h2 class="h5 mb-3">Mis turnos anteriores</h2>
        <div id="mis-turnos">
          <div class="spinner-block text-center"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
      </section>
    </div>
  </div>
</main>

<footer class="footer text-center mt-4">
  <div class="container"><p class="mb-0">SmartCampus UTA · 2025</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireSession } from '../../assets/js/auth.js';
  import { crearTurno, obtenerTurnosUsuario, obtenerTurnosPorEstado } from '../../../src/Persistence/supabaseClient.js';
  import { Cola } from '../../../src/Domain/DataStructures/Cola.js';

  const usuario = requireSession();
  if (!usuario) throw new Error('Sin sesión');

  const estadoBadge = (e) => {
    const cl = { esperando:'warning', atendiendo:'primary', finalizado:'success' };
    return `<span class="badge bg-${cl[e]||'secondary'}">${e}</span>`;
  };

  // ── Cola de espera ────────────────────────────────────────────────────────
  async function cargarColaEspera() {
    const el = document.getElementById('cola-espera');
    try {
      const data = await obtenerTurnosPorEstado('esperando');
      const cola = new Cola();
      data.forEach(t => cola.encolar(t));
      const items = cola.toArray();
      if (!items.length) { el.innerHTML = '<p class="text-muted">Cola vacía.</p>'; return; }
      el.innerHTML = items.map((t, i) => `
        <div class="queue-item mb-2">
          <div class="d-flex justify-content-between">
            <span><strong>Posición ${i+1}</strong> — ${t.servicio}</span>
            ${estadoBadge(t.estado)}
          </div>
          <p class="mb-0 text-muted small">Turno #${t.numero_turno}</p>
        </div>`).join('');
    } catch { el.innerHTML = '<p class="text-muted">No se pudo cargar la cola.</p>'; }
  }

  // ── Mis turnos ────────────────────────────────────────────────────────────
  async function cargarMisTurnos() {
    const el = document.getElementById('mis-turnos');
    try {
      const data = await obtenerTurnosUsuario(usuario.id);
      if (!data.length) { el.innerHTML = '<p class="text-muted">No tienes turnos registrados.</p>'; return; }
      el.innerHTML = `<div class="table-responsive"><table class="table table-sm">
        <thead><tr><th>#</th><th>Servicio</th><th>Estado</th><th>Fecha</th></tr></thead>
        <tbody>${data.map(t => `<tr>
          <td>${t.numero_turno}</td>
          <td>${t.servicio}</td>
          <td>${estadoBadge(t.estado)}</td>
          <td>${new Date(t.created_at).toLocaleString('es-EC')}</td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    } catch { el.innerHTML = '<p class="text-muted">Error al cargar turnos.</p>'; }
  }

  // ── Solicitar turno ───────────────────────────────────────────────────────
  document.getElementById('form-turno').addEventListener('submit', async (e) => {
    e.preventDefault();
    const servicio = document.getElementById('servicio').value;
    const btn = e.target.querySelector('button');
    const msg = document.getElementById('turno-msg');
    btn.disabled = true; btn.textContent = 'Procesando...'; msg.hidden = true;
    try {
      const turno = await crearTurno(usuario.id, servicio);
      document.getElementById('num-turno').textContent = turno.numero_turno;
      document.getElementById('srv-turno').textContent = turno.servicio;
      document.getElementById('turno-actual').hidden = false;
      e.target.reset();
      await cargarColaEspera();
      await cargarMisTurnos();
    } catch (err) {
      msg.className = 'alert alert-danger'; msg.textContent = err.message; msg.hidden = false;
    } finally {
      btn.disabled = false; btn.textContent = 'Tomar turno';
    }
  });

  await Promise.all([cargarColaEspera(), cargarMisTurnos()]);
</script>
</body>
</html>
